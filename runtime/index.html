<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#eef1f8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; manifest-src 'self'; worker-src 'self'; base-uri 'none'; object-src 'none'; form-action 'none'" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<title>SimuPIC — PIC16F628A simulator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  /* ===== themes: two palettes, friendly / classroom ===== */
  [data-theme="dark"]{
    color-scheme: dark;
    --bg:#14161c; --surface:#1c2027; --surface-2:#242a33; --surface-3:#2d343f;
    --border:#2e3540; --border-soft:#272d37;
    --text:#eef1f6; --text-dim:#9aa6b4; --text-faint:#69727f;
    --accent:#7c8cff; --accent-strong:#6a7bff; --accent-contrast:#ffffff; --accent-soft:rgba(124,140,255,.18);
    --ok:#54cd8c; --err:#ff6b6b; --purple:#cda9ff;
    --board:#0e1f17; --board-border:#2e3540;
    --code-bg:#0b0f15; --code-border:#222a34; --code-row-hover:#161b22;
    --code-text:#e6edf3; --code-addr:#6e7681; --code-word:#7cc7ff; --pc-row:rgba(84,205,140,.20);
    --shadow:0 12px 34px rgba(0,0,0,.38); --shadow-sm:0 2px 8px rgba(0,0,0,.28);
  }
  [data-theme="light"]{
    color-scheme: light;
    --bg:#eef1f8; --surface:#ffffff; --surface-2:#f1f4fa; --surface-3:#e6ecf5;
    --border:#dde3ee; --border-soft:#e8ecf4;
    --text:#1b2330; --text-dim:#586271; --text-faint:#8b94a3;
    --accent:#5868f5; --accent-strong:#4856e8; --accent-contrast:#ffffff; --accent-soft:rgba(88,104,245,.12);
    --ok:#1a9d5f; --err:#e5484d; --purple:#7c4def;
    --board:#0e1f17; --board-border:#cfd6e2;
    --code-bg:#f3f6fc; --code-border:#dde3ee; --code-row-hover:#e9eef7;
    --code-text:#1b2330; --code-addr:#8b94a3; --code-word:#3b5bdb; --pc-row:rgba(26,157,95,.16);
    --shadow:0 12px 30px rgba(40,55,90,.12); --shadow-sm:0 2px 8px rgba(40,55,90,.08);
  }

  body{
    margin:0; min-height:100vh; color:var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1100px 380px at 50% -120px, var(--accent-soft), transparent 70%), var(--bg);
    transition: background-color .2s ease, color .2s ease;
  }

  /* ===== app bar ===== */
  .appbar{ position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:12px;
    padding:11px 20px; background:var(--surface); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand .logo{ color:var(--accent); }
  .brand-name{ font-size:17px; font-weight:700; letter-spacing:.01em; }
  .brand-tag{ font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-soft);
    border-radius:999px; padding:2px 9px; letter-spacing:.02em; }
  .appbar-spacer{ flex:1; }
  .iconbtn{ width:38px; height:38px; display:grid; place-items:center; border-radius:11px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); cursor:pointer;
    transition:background .12s, color .12s; }
  .iconbtn:hover{ background:var(--surface-3); color:var(--text); }
  [data-theme="dark"] .icon-moon{ display:none; }
  [data-theme="light"] .icon-sun{ display:none; }

  /* ===== layout: rail · stage · debugger dock (IDE-style workspace) ===== */
  .layout{ --rail-w:272px; --dock-w:472px;
    display:grid; gap:16px; align-items:start;
    grid-template-columns: var(--rail-w) minmax(0,1fr) var(--dock-w);
    grid-template-areas:"rail stage dock";
    max-width:1840px; margin:0 auto; padding:18px 20px; }
  .layout.no-dock{ grid-template-columns: var(--rail-w) minmax(0,1fr); grid-template-areas:"rail stage"; }
  .layout.no-dock .dock{ display:none; }
  .rail{ grid-area:rail; display:flex; flex-direction:column; gap:14px; position:sticky; top:74px; }
  .stage{ grid-area:stage; min-width:0; display:flex; flex-direction:column; gap:14px; }
  .dock{ grid-area:dock; position:sticky; top:74px; align-self:start; min-width:0;
    max-height:calc(100vh - 90px); }

  /* ===== cards / controls ===== */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; box-shadow:var(--shadow-sm); }
  .card-title{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); margin:0 0 10px; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:7px;
    background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:11px;
    padding:9px 14px; font-size:13.5px; font-weight:500; font-family:inherit; cursor:pointer;
    transition:background .12s, border-color .12s, transform .04s; }
  .btn:hover{ background:var(--surface-3); }
  .btn:active{ transform:translateY(1px); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn-primary{ background:var(--accent); border-color:transparent; color:var(--accent-contrast); box-shadow:0 4px 14px var(--accent-soft); }
  .btn-primary:hover{ background:var(--accent-strong); }
  .btn-block{ display:flex; width:100%; }
  .btn-row{ display:flex; gap:8px; }
  .btn-row .btn{ flex:1; }
  .transport{ display:flex; gap:8px; }
  .tbtn{ flex:1; display:grid; place-items:center; height:44px; border-radius:11px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim);
    cursor:pointer; transition:background .12s, color .12s, border-color .12s, transform .04s; }
  .tbtn:hover:not(:disabled){ background:var(--surface-3); color:var(--text); }
  .tbtn:active:not(:disabled){ transform:translateY(1px); }
  .tbtn:disabled{ opacity:.45; cursor:not-allowed; }
  /* the play/pause toggle is the primary action: accent while it shows ▶ (ready to run), neutral while it shows ⏸ (running) */
  #playPauseBtn:not(.active){ background:var(--accent); border-color:transparent; color:var(--accent-contrast); box-shadow:0 4px 14px var(--accent-soft); }
  #playPauseBtn:not(.active):hover:not(:disabled){ background:var(--accent-strong); }
  .tbtn .ic-pause{ display:none; }       /* play/pause toggle: show the play glyph by default… */
  .tbtn.active .ic-play{ display:none; } /* …and swap to pause while running */
  .tbtn.active .ic-pause{ display:block; }
  .file-list{ display:flex; flex-direction:column; gap:8px; }
  #wasmWrap{ display:block; }
  #wasmWrap.hidden{ display:none; }
  input[type=file]{ display:none; }
  .select, .input{ width:100%; background:var(--surface-2); color:var(--text);
    border:1px solid var(--border); border-radius:10px; padding:9px 11px; font-size:13.5px; font-family:inherit; }
  .select{ cursor:pointer; }
  .select:disabled{ opacity:.55; cursor:not-allowed; }
  .input{ font-family:ui-monospace, monospace; }
  .field{ margin-top:12px; }
  .field>label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; }
  #clockVal{ display:block; margin-top:6px; }
  .range{ width:100%; margin-top:9px; accent-color:var(--accent); cursor:pointer; }
  .readout{ margin-top:11px; font:12px/1 ui-monospace, monospace; color:var(--text-dim); letter-spacing:.02em; }
  .stage.drop .board-wrap{ outline:2px dashed var(--accent); outline-offset:6px; border-radius:18px; }

  .status{ font-size:12px; color:var(--text-dim); }
  .status.ok{ color:var(--ok); }
  .status.err{ color:var(--err); }
  #status{ background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:11px 13px; box-shadow:var(--shadow-sm); line-height:1.45; }

  /* ===== board ===== */
  .board-wrap{ position:relative; width:100%; aspect-ratio:920/640; overflow:hidden;
    background:var(--board); border:1px solid var(--board-border); border-radius:18px; box-shadow:var(--shadow); }
  #board{ display:block; width:100%; height:100%; touch-action:none; cursor:grab; }
  #board.panning{ cursor:grabbing; }
  /* floating zoom toolbar (top-right of the board) */
  .zoombar{ position:absolute; top:12px; right:12px; z-index:5; display:flex; align-items:center; gap:4px;
    padding:4px; background:rgba(13,20,17,.78); border:1px solid rgba(120,160,140,.28); border-radius:12px;
    backdrop-filter:blur(6px); box-shadow:0 6px 18px rgba(0,0,0,.32); }
  .zbtn{ width:30px; height:30px; display:grid; place-items:center; border-radius:8px; border:1px solid transparent;
    background:transparent; color:#cfeadd; font-size:17px; line-height:1; font-family:inherit; cursor:pointer; transition:background .12s; }
  .zbtn:hover{ background:rgba(120,160,140,.20); }
  .zbtn.wide{ width:auto; padding:0 10px; font-size:12px; font-weight:600; }
  .zlabel{ min-width:42px; text-align:center; font:600 12px ui-monospace,monospace; color:#bfe6d0; user-select:none; }
  .zsep{ width:1px; height:18px; background:rgba(120,160,140,.28); margin:0 2px; }
  .board-hint{ font-size:11.5px; color:var(--text-faint); text-align:center; margin-top:-4px; }

  /* ===== debugger ===== */
  .dbgToggle{ align-self:center; background:var(--surface); color:var(--text-dim);
    border:1px solid var(--border); border-radius:11px; padding:8px 16px; font-size:13px; font-weight:600;
    font-family:inherit; cursor:pointer; box-shadow:var(--shadow-sm); transition:background .12s,color .12s; }
  .dbgToggle:hover{ background:var(--surface-2); color:var(--text); }
  .dbgToggle:disabled{ opacity:.45; cursor:not-allowed; }
  .dbgPanel{ width:100%; max-width:920px; box-sizing:border-box; background:var(--surface);
    border:1px solid var(--border); border-radius:16px; padding:14px 16px; box-shadow:var(--shadow-sm);
    font-family:ui-monospace, monospace; font-size:12px; color:var(--text-dim); }
  .dbgPanel.hidden{ display:none; }
  /* ===== code editor (ASM -> .hex) ===== */
  .edPanel{ display:flex; flex-direction:column; gap:10px;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  .edBar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .edTitle{ color:var(--text-dim); font-size:12px; }
  .edSpacer{ flex:1 1 auto; }
  .edSrc{ width:100%; box-sizing:border-box; min-height:240px; resize:vertical;
    background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:10px;
    padding:10px 12px; font-family:ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size:13px; line-height:1.5; tab-size:4; -moz-tab-size:4; white-space:pre; }
  .edSrc:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .edStatus{ font-size:12.5px; min-height:1.2em; white-space:pre-wrap; }
  .edStatus.ok{ color:var(--ok); }
  .edStatus.err{ color:var(--err); }
  .dbgHeader{ display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center; }
  .dbgHeader b{ color:var(--text); font-weight:700; }
  .dbgFlags{ display:inline-flex; gap:4px; }
  .dbgFlags span{ padding:1px 6px; border-radius:5px; background:var(--surface-2); color:var(--text-faint); }
  .dbgFlags span.on{ background:var(--accent-soft); color:var(--accent); }
  #stepBtn, #step10, #step100{ background:var(--surface-2); color:var(--text); border:1px solid var(--border);
    border-radius:9px; padding:5px 12px; font-size:12px; font-family:inherit; cursor:pointer; transition:background .12s; }
  #stepBtn:hover, #step10:hover, #step100:hover{ background:var(--surface-3); }
  #stepBtn:disabled, #step10:disabled, #step100:disabled{ opacity:.45; cursor:not-allowed; }
  .dbgTabs{ display:flex; gap:5px; margin:12px 0 8px; }
  .dbgTab{ background:transparent; color:var(--text-dim); border:1px solid transparent; border-radius:9px;
    padding:6px 13px; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .12s,color .12s; }
  .dbgTab:hover{ background:var(--surface-2); color:var(--text); }
  .dbgTab.active{ background:var(--accent-soft); color:var(--accent); }
  .dbgView.hidden{ display:none; }
  .dbgProg{ max-height:240px; overflow-y:auto; border:1px solid var(--code-border); border-radius:10px; background:var(--code-bg); }
  .progRow{ display:flex; gap:12px; padding:2px 10px; cursor:pointer; }
  .progRow:hover{ background:var(--code-row-hover); }
  .progRow.pc{ background:var(--pc-row); }
  .progRow .bp{ width:9px; height:9px; border-radius:50%; border:1px solid var(--border); flex:0 0 auto; align-self:center; }
  .progRow .bp.on{ background:var(--err); border-color:var(--err); }
  .progRow .pa{ color:var(--code-addr); width:46px; }
  .progRow .pw{ color:var(--code-word); width:56px; }
  .progRow .pm{ color:var(--code-text); }
  .dataBankBar{ color:var(--text-faint); font-size:11px; margin-bottom:6px; display:flex; gap:6px; align-items:center; }
  .bankBtn{ background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border); border-radius:7px; padding:3px 10px; font-size:11px; font-family:inherit; cursor:pointer; }
  .bankBtn.active{ background:var(--accent-soft); color:var(--accent); border-color:transparent; }
  .dbgData{ display:grid; grid-template-columns:auto repeat(16,1fr); gap:2px 6px; background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:9px; font-size:11px; }
  .dbgData .dlabel{ color:var(--code-addr); padding-right:4px; }
  .dbgData .dcell{ color:var(--code-text); text-align:center; cursor:pointer; border-radius:3px; }
  .dbgData .dcell.sfr{ color:var(--purple); }
  .dbgData .dcell:hover{ outline:1px solid var(--accent); }
  .dbgSFR{ background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:7px 9px; }
  .sfrRow{ display:flex; gap:10px; align-items:center; padding:1px 0; }
  .sfrRow .sname{ color:var(--text-dim); width:64px; }
  .sfrRow .sval{ color:var(--code-text); width:46px; cursor:pointer; border-radius:3px; }
  .sfrRow .sval:hover{ outline:1px solid var(--accent); }
  .sfrRow .sbin{ color:var(--code-addr); width:72px; }
  .sfrRow .sbits{ display:inline-flex; gap:3px; flex-wrap:wrap; }
  .sfrRow .sbits span{ padding:0 4px; border-radius:3px; background:var(--surface-2); color:var(--text-faint); font-size:10px; }
  .sfrRow .sbits span.on{ background:var(--accent-soft); color:var(--accent); }
  .watchBar{ display:flex; gap:6px; margin-bottom:6px; }
  .watchBar input{ flex:1 1 auto; min-width:0; background:var(--code-bg); color:var(--code-text); border:1px solid var(--border); border-radius:8px; padding:6px 9px; font-family:ui-monospace,monospace; font-size:12px; }
  .watchBar button{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 13px; font-size:12px; font-family:inherit; cursor:pointer; }
  .watchBar button:hover{ background:var(--surface-3); }
  .dbgWatch{ background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:7px 9px; min-height:28px; }
  .watchEmpty{ color:var(--text-faint); font-size:11px; line-height:1.4; }
  .watchRow{ display:flex; gap:6px; align-items:center; padding:1px 0; font-size:10.5px; }
  .watchRow .wname{ color:var(--accent); width:46px; font-weight:600; }
  .watchRow .waddr{ color:var(--code-addr); width:30px; }
  .watchRow .wval{ color:var(--code-text); width:30px; }
  .watchRow .wbin{ color:var(--code-addr); width:50px; }
  .watchRow .wdel{ margin-left:auto; background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:15px; line-height:1; }
  .watchRow .wdel:hover{ color:var(--err); }
  .cellEdit{ width:34px; background:var(--surface); color:var(--accent); border:1px solid var(--accent); border-radius:4px; font-family:ui-monospace,monospace; font-size:11px; padding:0 2px; }
  .dbgStack{ background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:8px 10px; }
  .stkHead{ color:var(--text-faint); font-size:11px; margin-bottom:7px; }
  .stkHead b{ color:var(--text); }
  .stkRow{ display:flex; gap:10px; align-items:center; padding:2px 5px; border-radius:4px; }
  .stkRow.top{ background:var(--accent-soft); }
  .stkRow .sl{ width:16px; text-align:right; color:var(--code-addr); }
  .stkRow .sv{ width:60px; color:var(--code-addr); }
  .stkRow.used .sv{ color:var(--code-word); }
  .stkRow .stag{ color:var(--accent); font-size:11px; }

  /* ===== app-bar labelled button (debugger toggle) ===== */
  .barbtn{ display:inline-flex; align-items:center; gap:7px; height:38px; padding:0 13px; border-radius:11px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); font:600 13px inherit; font-family:inherit; cursor:pointer;
    transition:background .12s, color .12s, border-color .12s; }
  .barbtn:hover{ background:var(--surface-3); color:var(--text); }
  .barbtn.active{ background:var(--accent-soft); color:var(--accent); border-color:transparent; }

  /* ===== debugger dock ===== */
  .dock{ display:flex; align-items:stretch; }
  .dockResize{ flex:0 0 11px; align-self:stretch; cursor:col-resize; position:relative; }
  .dockResize::before{ content:""; position:absolute; left:4px; top:50%; transform:translateY(-50%);
    width:3px; height:46px; border-radius:3px; background:var(--border); transition:background .12s; }
  .dockResize:hover::before, .dockResize.drag::before{ background:var(--accent); }
  .dockInner{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; gap:10px;
    background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px;
    box-shadow:var(--shadow-sm); height:calc(100vh - 90px); max-height:calc(100vh - 90px); }
  .dockBar{ display:flex; align-items:center; gap:8px; }
  .dockTitle{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); }
  .dockSpacer{ flex:1; }
  .dockIcon{ width:26px; height:26px; display:grid; place-items:center; border-radius:8px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); font-size:13px; cursor:pointer; }
  .dockIcon:hover{ background:var(--surface-3); color:var(--text); }
  .dbgHead{ display:flex; flex-direction:column; gap:9px; padding:9px 11px; background:var(--surface-2);
    border:1px solid var(--border-soft); border-radius:11px; font-family:ui-monospace, monospace; font-size:12px; color:var(--text-dim); }
  .dbgRegs{ display:flex; flex-wrap:wrap; gap:5px 14px; align-items:center; }
  .dbgRegs b{ color:var(--text); font-weight:700; }
  .dbgStep{ display:flex; gap:6px; }
  .dbgPanes{ flex:1 1 auto; min-height:0; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .dbgPane{ min-width:0; min-height:0; display:flex; flex-direction:column;
    border:1px solid var(--border-soft); border-radius:11px; overflow:hidden; background:var(--code-bg); }
  .dbgPaneHead{ display:flex; align-items:center; gap:6px; padding:6px; background:var(--surface-2); border-bottom:1px solid var(--border-soft); }
  .paneView{ flex:1 1 auto; min-width:0; background:var(--surface); color:var(--text); border:1px solid var(--border);
    border-radius:8px; padding:5px 8px; font:600 12px system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; cursor:pointer; }
  .dbgPaneBody{ flex:1 1 auto; min-height:0; overflow:auto; padding:8px;
    font-family:ui-monospace, monospace; font-size:12px; color:var(--text-dim); }
  /* views fill their pane (drop the standalone panel chrome) */
  .dbgPaneBody .dbgProg{ max-height:none; border:none; border-radius:0; background:transparent; }
  .dbgPaneBody .dbgData, .dbgPaneBody .dbgSFR, .dbgPaneBody .dbgStack, .dbgPaneBody .dbgWatch{ border:none; background:transparent; padding:0; }
  .dbgEmpty{ color:var(--text-faint); font-size:11.5px; line-height:1.5; padding:6px 2px; }
  .paneBtn{ flex:0 0 auto; width:27px; height:27px; display:grid; place-items:center; border-radius:8px;
    background:var(--surface); border:1px solid var(--border); color:var(--text-dim); font-size:13px; line-height:1; cursor:pointer; transition:background .12s, color .12s; }
  .paneBtn:hover{ background:var(--surface-3); color:var(--text); }
  .paneSplit{ display:none; }                          /* shown only in single-pane mode (to re-open the 2nd pane) */
  .dbgPanes.single{ grid-template-columns:1fr; }
  .dbgPanes.single .dbgPane.paneB{ display:none; }
  .dbgPanes.single .paneSplit{ display:grid; }
  /* dock blocks: Depurador + Código stack and share the dock height; either can be closed independently */
  .dockBlock{ flex:1 1 0; min-height:0; display:flex; flex-direction:column; gap:10px; }
  .dockBlock.hidden{ display:none; }
  .dockBlockBar{ display:flex; align-items:center; gap:8px; }
  .dockBlock:not(.hidden) + .dockBlock:not(.hidden){ border-top:1px solid var(--border-soft); padding-top:12px; }
  /* ASM editor, docked: the textarea fills the block height */
  #dockEditor .edSrc{ flex:1 1 auto; min-height:120px; resize:none; }

  /* ===== responsive ===== */
  /* below 1200px: debugger un-docks to a full-width panel under the stage; single pane (dual-view is desktop-only) */
  @media (max-width: 1200px){
    .layout{ grid-template-columns: var(--rail-w) minmax(0,1fr); grid-template-areas:"rail stage" "dock dock"; }

<script>

// ===== two demo boards =====

const SEG_COUNTER_HEX =
  ":10000000831686018312A00120080E208600192085\n" +
  ":10001000A00A0A3020020319A001042882073F34F5\n" +
  ":1000200006345B344F3466346D347D3407347F34AA\n" +
  ":100030006F34FF30A100FF30A200A20B1D28A10BDE\n" +

const SEG_COUNTER_ASM = `; Contador de 7 segmentos — cuenta 0..9 en un display conectado a PORTB (RB0..RB6).
CONT    EQU     0x20            ; dígito actual (0..9)
D1      EQU     0x21            ; contadores de la demora
D2      EQU     0x22

        ORG     0
        bsf     STATUS,RP0      ; banco 1
        clrf    TRISB           ; PORTB como salida (segmentos)
        bcf     STATUS,RP0      ; banco 0

loop

        call    tabla           ; W = patrón de 7 segmentos del dígito
        movwf   PORTB           ; mostrarlo
        call    demora

        movlw   .10
        subwf   CONT,w          ; ¿CONT == 10?
        btfsc   STATUS,Z

tabla                           ; tabla 7 segmentos (cátodo común), dígitos 0..9
        addwf   PCL,f
        retlw   0x3F
        retlw   0x06
        retlw   0x5B
        retlw   0x4F
        retlw   0x66
        retlw   0x6D
        retlw   0x7D
        retlw   0x07
        retlw   0x7F
        retlw   0x6F

        movlw   0xFF
        movwf   D1
demora1
        movlw   0xFF
        movwf   D2
demora2
        decfsz  D2,f

const LAB_DIAGRAM = { name:"Two-digit counter", components:[
  {type:"led", pin:"RB7", label:"Status"},
  {type:"button", pin:"RA4", activeLow:true, label:"SW1"},
  {type:"sevenseg", pins:["RB0","RB1","RB2","RB3","RB4","RB5","RB6"], common:"RA1", commonActiveLow:false},
  {type:"sevenseg", pins:["RB0","RB1","RB2","RB3","RB4","RB5","RB6"], common:"RA0", commonActiveLow:false},
]};
const MUX_COUNTER_HEX =
  ":1000000083168601FC308500831207309F0085012E\n" +
  ":100010008601A001A101A201A301850120082E20D3\n" +
  ":10002000860005143920850121082E2086008514BC\n" +
  ":100030003920A20F0D28A30A03302302031D0D2827\n" +
  ":10004000A301A00A0A302002031D0D28A001A10A65\n" +
  ":100050000A302102031D0D28A1010D2882073F341B\n" +
  ":1000600006345B344F3466346D347D3407347F346A\n" +
  ":0C0070006F344030A400A40B3B280800B3\n" +
  ":00000001FF\n";
const MUX_COUNTER_ASM = `; Contador multiplexado de 2 dígitos — unidades (display en RA0) y decenas (RA1),
; segmentos compartidos en PORTB. Se multiplexa rápido para que se vean ambos.
UNI     EQU     0x20            ; dígito de unidades (0..9)
DEC     EQU     0x21            ; dígito de decenas (0..9)
MUXCNT  EQU     0x22            ; contador de refresco del multiplexado
DIVCNT  EQU     0x23            ; divisor: el conteo avanza cada 3*256 refrescos
DLY     EQU     0x24            ; demora de encendido de cada dígito

        ORG     0
        bsf     STATUS,RP0      ; banco 1
        clrf    TRISB           ; PORTB (segmentos) como salida
        movlw   0xFC
        movwf   TRISA           ; RA0/RA1 como salida (común de cada display)
        bcf     STATUS,RP0      ; banco 0
        movlw   0x07
        movwf   CMCON           ; comparadores apagados → PORTA digital
        clrf    PORTA
        clrf    PORTB
        clrf    UNI
        clrf    DEC
        clrf    MUXCNT
        clrf    DIVCNT
loop
        clrf    PORTA           ; apagar displays
        movf    UNI,w
        call    tabla
        movwf   PORTB           ; segmentos de las unidades
        bsf     PORTA,0         ; encender display 0
        call    demora
        clrf    PORTA
        movf    DEC,w
        call    tabla
        movwf   PORTB           ; segmentos de las decenas
        bsf     PORTA,1         ; encender display 1
        call    demora
        incfsz  MUXCNT,f        ; ¿pasaron 256 refrescos?
        goto    loop
        incf    DIVCNT,f
        movlw   0x03
        subwf   DIVCNT,w
        btfss   STATUS,Z        ; ¿DIVCNT == 3?
        goto    loop
        clrf    DIVCNT          ; sí → avanzar el conteo
        incf    UNI,f
        movlw   .10
        subwf   UNI,w
        btfss   STATUS,Z        ; ¿UNI == 10?
        goto    loop
        clrf    UNI
        incf    DEC,f
        movlw   .10
        subwf   DEC,w
        btfss   STATUS,Z        ; ¿DEC == 10?
        goto    loop
        clrf    DEC
        goto    loop

tabla                           ; 7 segmentos, dígitos 0..9
        addwf   PCL,f
        retlw   0x3F
        retlw   0x06
        retlw   0x5B
        retlw   0x4F
        retlw   0x66
        retlw   0x6D
        retlw   0x7D
        retlw   0x07
        retlw   0x7F
        retlw   0x6F

demora                          ; demora corta (tiempo de encendido del dígito)
        movlw   0x40
        movwf   DLY
demora1
        decfsz  DLY,f
        goto    demora1

`;
const EEPROM_COUNTER_HEX =
  ":10000000831686019B011C141A08F00083120A3023\n" +
  ":1000100070020318F001F00A0A3070020319F001AF\n" +
  ":1000200083169B0170089A001C1555309D00AA305C\n" +
  ":100030009D009C14831270081F2086001B288207D5\n" +
  ":100040003F3406345B344F3466346D347D340734CA\n" +
  ":040050007F346F3456\n" +
  ":00000001FF\n";
const EEPROM_COUNTER_ASM = `; Contador en EEPROM — el conteo sobrevive al reinicio (se guarda en la EEPROM
; interna). En cada arranque lee el último valor, lo incrementa y lo vuelve a guardar.
CONT    EQU     0x70            ; RAM común (visible en todos los bancos)

        ORG     0
        bsf     STATUS,RP0      ; banco 1
        clrf    TRISB           ; PORTB como salida (7 segmentos)
        ; --- leer el último valor guardado (EEPROM dirección 0) ---
        clrf    EEADR
        bsf     EECON1,RD       ; iniciar lectura
        movf    EEDATA,w
        movwf   CONT            ; CONT = valor leído
        bcf     STATUS,RP0      ; banco 0
        movlw   .10
        subwf   CONT,w
        btfsc   STATUS,C        ; ¿CONT >= 10? (EEPROM sin usar = 0xFF)
        clrf    CONT            ; sí → arrancar de 0
        incf    CONT,f          ; CONT = CONT + 1
        movlw   .10
        subwf   CONT,w
        btfsc   STATUS,Z        ; ¿CONT == 10?
        clrf    CONT            ; sí → volver a 0
        ; --- guardar el nuevo valor (secuencia de desbloqueo) ---
        bsf     STATUS,RP0      ; banco 1
        clrf    EEADR
        movf    CONT,w
        movwf   EEDATA
        bsf     EECON1,WREN     ; habilitar escritura
        movlw   0x55
        movwf   EECON2
        movlw   0xAA
        movwf   EECON2
        bsf     EECON1,WR       ; iniciar escritura
        bcf     STATUS,RP0      ; banco 0
mostrar                         ; mostrar el conteo para siempre
        movf    CONT,w
        call    tabla
        movwf   PORTB
        goto    mostrar

tabla                           ; 7 segmentos, dígitos 0..9
        addwf   PCL,f
        retlw   0x3F
        retlw   0x06
        retlw   0x5B
        retlw   0x4F
        retlw   0x66
        retlw   0x6D
        retlw   0x7D
        retlw   0x07
        retlw   0x7F
        retlw   0x6F
        END
`;

// ===== PIC16F628A DIP-18 pinout (pin 1 top-left, down the left, up the right) =====
const LEFT = ["RA2","RA3","RA4","RA5","VSS","RB0","RB1","RB2","RB3"];      // pins 1..9
const RIGHT = ["RA1","RA0","RA7","RA6","VDD","RB7","RB6","RB5","RB4"];     // pins 18..10
const CHIP = { x: 410, y: 120, w: 110, h: 300 };
const PIN = {};
(function () {
  const pitch = (CHIP.h - 44) / 8;
  for (let i = 0; i < 9; i++) {
    const y = CHIP.y + 22 + i * pitch;
    PIN[LEFT[i]] = { x: CHIP.x - 16, y, side: "L", num: i + 1 };
    PIN[RIGHT[i]] = { x: CHIP.x + CHIP.w + 16, y, side: "R", num: 18 - i };
  }
})();

// ===== wasm glue =====
let X = null, MEM = null;
const enc = new TextEncoder();
function pinIndex(n){ const m=/^R([AB])([0-7])$/.exec(n||""); return m?(m[1]==="B"?8:0)+(+m[2]):-1; }
function pinVal(n,pa,pb){ const i=pinIndex(n); if(i<0)return 0; return i<8?(pa>>i)&1:(pb>>(i-8))&1; }
async function instantiate(bytes){ const {instance}=await WebAssembly.instantiate(bytes,{}); X=instance.exports; MEM=X.memory; }
function loadHex(text){
  const d=enc.encode(text);
  if(d.length>X.np_hex_buffer_len()) return false;
  new Uint8Array(MEM.buffer, X.np_hex_buffer(), d.length).set(d);
  return X.np_load_hex(d.length)===1;
}
function b64ToBytes(b64){ const s=atob(b64),a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }

// ===== components (sub-frame sampled for honest multiplexing) =====
// Labels-only board: no wires. Each component carries a pin badge (LED / button
// → its pin; 7-seg → its segment pins + common), so students read the connection
// by name and the layout is free to place parts wherever is clearest. build()
// computes geometry + badge specs only; the sample/integrate timing is unchanged.
function rangeLabel(pins){
  const m=pins.map(p=>/^R([AB])([0-9])$/.exec(p));
  if(m.every(Boolean) && m.every((x,i)=> x[1]===m[0][1] && (+x[2])===(+m[0][2]+i)))
    return pins[0]+"–"+pins[pins.length-1];
  return pins.join(" ");
}
function build(diagram){
  wiring = { labels:[] }; buttonPins.clear();
  const segCount=diagram.components.filter(c=>c.type==="sevenseg").length;
  const big=segCount<=2;
  const SW=big?116:94, SH=big?140:124, GAP=big?42:28;
  const DISP_TOP=446;
  const totalW=segCount*SW+Math.max(0,segCount-1)*GAP, startX=(920-totalW)/2;
  let si=0; const displays=[];
  const objs=diagram.components.map((c)=>{
    if(c.type==="led"){
      const p=PIN[c.pin]||{x:CHIP.x,y:CHIP.y}; const dir=p.side==="R"?1:-1;
      const pos={x:p.x+dir*52, y:p.y};
      wiring.labels.push({x:pos.x+dir*36, y:pos.y, text:c.pin, kind:"pin"});
      if(c.label) wiring.labels.push({x:pos.x, y:pos.y-23, text:c.label, kind:"cap"});
      return {on:0,n:0,b:0,reset(){this.on=0;this.n=0;},clear(){this.on=0;this.n=0;this.b=0;},
        sample(pa,pb){ const lit=c.activeLow?pinVal(c.pin,pa,pb)===0:pinVal(c.pin,pa,pb)===1; if(lit)this.on++; this.n++; },
        integrate(dt){ const d=this.n?this.on/this.n:0; this.b+=(d-this.b)*(1-Math.exp(-dt/45)); },
        drawBody(ctx){ drawLed(ctx,pos.x,pos.y,this.b); } };
    }
    if(c.type==="sevenseg"){
      const pos={x: startX + (si++)*(SW+GAP), y:DISP_TOP};
      displays.push({pos, W:SW, H:SH, pins:c.pins, common:c.common});
      // Honest persistence of vision for multiplexed displays. Each frame the segment
      // brightness decays toward 0 with a ~45 ms time constant (the eye's persistence)
      // and is pulled to full whenever the segment is actually lit (its digit selected
      // AND the segment driven). So a fast mux fuses to a solid, bright display, while a
      // mux slower than flicker fusion visibly flickers — exactly like real hardware,
      // and unlike Proteus which hides a slow refresh. selN = sub-steps this digit was
      // selected this frame; the decay is time-based, so it's frame-rate-agnostic.
      return {seg:[0,0,0,0,0,0,0],selN:0,b:[0,0,0,0,0,0,0],
        reset(){this.seg=[0,0,0,0,0,0,0];this.selN=0;},
        clear(){this.seg=[0,0,0,0,0,0,0];this.selN=0;this.b=[0,0,0,0,0,0,0];},
        sample(pa,pb){ const sel=c.common?(c.commonActiveLow?pinVal(c.common,pa,pb)===0:pinVal(c.common,pa,pb)===1):true;
          if(sel){ this.selN++; for(let i=0;i<7;i++) if(pinVal(c.pins[i],pa,pb)===1) this.seg[i]++; } },
        integrate(dt){ const k=Math.exp(-dt/45);
          for(let i=0;i<7;i++){ const lit=(this.selN>0 && this.seg[i]/this.selN>=0.5)?1:0; this.b[i]=Math.max(this.b[i]*k, lit); } },
        drawBody(ctx){ drawSeven(ctx,pos.x,pos.y,this.b,SW,SH); } };
    }
    if(c.type==="button"){
      const p=PIN[c.pin]||{x:CHIP.x,y:CHIP.y}; const dir=p.side==="R"?1:-1;
      const bw=72, bh=44, pos={x:p.x+dir*84-(dir<0?bw:0), y:p.y-bh/2};
      buttonPins.add(c.pin);
      if(c.label) wiring.labels.push({x:pos.x+bw/2, y:pos.y+bh+13, text:c.pin, kind:"pin"});
      return {pressed:false,pin:c.pin,reset(){},sample(){},clear(){this.pressed=false;},
        idle(){ const pi=pinIndex(c.pin); if(X&&pi>=0) X.np_set_pin(pi, c.activeLow?1:0); },
        press(v){ this.pressed=v; const pi=pinIndex(c.pin); if(X&&pi>=0){ X.np_set_pin(pi, (v?!c.activeLow:c.activeLow)?1:0);
          if(v && !((X.np_read_data(pi<8?0x85:0x86)>>(pi&7))&1)) setStatus("⚠ "+c.pin+": hay un botón pero el pin está configurado como salida","err"); } },
        hit(mx,my){ return mx>=pos.x&&mx<=pos.x+bw&&my>=pos.y&&my<=pos.y+bh; },
        drawBody(ctx){ drawButton(ctx,pos.x,pos.y,this.pressed,c.label||c.pin); } };
    }
    return {reset(){},sample(){},drawBody(){}};
  });
  // 7-seg pin labels: each display shows its own "com" pin, and the segment→pin
  // map (a–g) is shown once below the row when the displays share segment pins
  // (the usual multiplexed case); otherwise a per-display legend.
  if(displays.length){
    const p0=displays[0].pins;
    const allSame=displays.every(d=>d.pins.length===p0.length && d.pins.every((v,i)=>v===p0[i]));
    if(allSame){
      for(const d of displays) if(d.common)
        wiring.labels.push({x:d.pos.x+d.W/2, y:d.pos.y+d.H+11, text:"com "+d.common, kind:"pin"});
      const yKey=Math.max(...displays.map(d=>d.pos.y+d.H)) + (displays.some(d=>d.common)?24:11);
      const L=displays[0].pos.x, R=displays[displays.length-1].pos.x+displays[displays.length-1].W;
      wiring.labels.push({x:(L+R)/2, y:yKey, kind:"segkey", pins:p0});
    } else {
      for(const d of displays)
        wiring.labels.push({x:d.pos.x+d.W/2, y:d.pos.y+d.H+11, kind:"seglegend",
          entries:[...d.pins.map((p,i)=>["abcdefg"[i]||"?",p]), ...(d.common?[["com",d.common]]:[])]});
    }
  }
  return objs;
}

// ===== drawing =====
// Label layer: a pin badge on each component (LED/button → pin, 7-seg → segment
// pins + common). No wires — the connection is read by name, matching the pin
// names on the chip. Drawn on top so it stays legible.
function drawWiring(ctx){
  if(!wiring) return;
  ctx.save();
  for(const lb of wiring.labels){
    if(lb.kind==="segkey") drawSegKey(ctx,lb);
    else if(lb.kind==="seglegend") drawSegLegend(ctx,lb);
    else if(lb.kind==="cap"){ ctx.font="9px ui-monospace, monospace"; ctx.fillStyle="#8fb3a0"; ctx.textAlign="center"; ctx.textBaseline="alphabetic"; ctx.fillText(lb.text, lb.x, lb.y); }
    else drawPinBadge(ctx, lb.x, lb.y, lb.text);
  }
  ctx.restore();
}
function drawPinBadge(ctx,x,y,text){
  ctx.font="bold 10px ui-monospace, monospace";
  const w=ctx.measureText(text).width+12, h=16, bx=x-w/2, by=y-h/2;
  roundRect(ctx,bx,by,w,h,5); ctx.fillStyle="rgba(16,34,26,0.92)"; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle="#3f7a5c"; ctx.stroke();
  ctx.fillStyle="#bfe6d0"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(text,x,y); ctx.textBaseline="alphabetic";
}
// horizontal segment→pin key (a RB1 · b RB2 · … · g RB7), shown once for displays
// that share segment pins. Segment letter dim, pin name bright.
function drawSegKey(ctx,lb){
  const letters="abcdefg";
  ctx.font="8.5px ui-monospace, monospace";
  const cellW=lb.pins.map((p,i)=>ctx.measureText((letters[i]||"?")+" "+p).width);
  const sep=10, total=cellW.reduce((a,b)=>a+b,0)+sep*(lb.pins.length-1);
  const padX=11, h=18, w=total+padX*2, bx=lb.x-w/2, by=lb.y;
  roundRect(ctx,bx,by,w,h,7); ctx.fillStyle="rgba(16,34,26,0.92)"; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle="#3f7a5c"; ctx.stroke();
  ctx.textBaseline="middle"; ctx.textAlign="left"; let x=bx+padX;
  for(let i=0;i<lb.pins.length;i++){
    const l=letters[i]||"?";
    ctx.fillStyle="#7d9b8a"; ctx.fillText(l, x, by+h/2);
    ctx.fillStyle="#bfe6d0"; ctx.fillText(lb.pins[i], x+ctx.measureText(l+" ").width, by+h/2);
    x+=cellW[i]+sep;
  }
  ctx.textBaseline="alphabetic";
}
// 2-column segment legend per display (fallback when displays use different pins).
function drawSegLegend(ctx,lb){
  ctx.font="8.5px ui-monospace, monospace";
  const e=lb.entries, rows=Math.ceil(e.length/2), c1=e.slice(0,rows), c2=e.slice(rows);
  const cw=arr=>arr.length?Math.max(...arr.map(([l,p])=>ctx.measureText(l+" "+p).width)):0;
  const w1=cw(c1), w2=cw(c2), colGap=12, padX=10, padY=5, lineH=10;
  const w=padX*2+w1+(c2.length?colGap+w2:0), h=padY*2+rows*lineH, bx=lb.x-w/2, by=lb.y;
  roundRect(ctx,bx,by,w,h,6); ctx.fillStyle="rgba(16,34,26,0.92)"; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle="#3f7a5c"; ctx.stroke();
  ctx.textBaseline="middle"; ctx.textAlign="left";
  const drawCol=(col,cx)=>col.forEach(([l,p],i)=>{ const cy=by+padY+i*lineH+lineH/2;
    ctx.fillStyle="#7d9b8a"; ctx.fillText(l, cx, cy);
    ctx.fillStyle="#bfe6d0"; ctx.fillText(p, cx+ctx.measureText(l+" ").width, cy); });
  drawCol(c1, bx+padX); if(c2.length) drawCol(c2, bx+padX+w1+colGap);
  ctx.textBaseline="alphabetic";
}
function drawChip(ctx){
  ctx.fillStyle="#15191f"; ctx.strokeStyle="#454d57"; ctx.lineWidth=2;
  roundRect(ctx,CHIP.x,CHIP.y,CHIP.w,CHIP.h,8); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(CHIP.x+CHIP.w/2,CHIP.y+8,9,0,Math.PI); ctx.fillStyle="#0a1f14"; ctx.fill();
  ctx.fillStyle="#c9d1d9"; ctx.font="bold 13px system-ui"; ctx.textAlign="center";
  ctx.save(); ctx.translate(CHIP.x+CHIP.w/2,CHIP.y+CHIP.h/2); ctx.fillText("PIC16F628A",0,-6);
  ctx.fillStyle="#6e7681"; ctx.font="11px system-ui"; ctx.fillText("DIP-18",0,12); ctx.restore();
  ctx.font="11px ui-monospace, monospace";
  // live pin-state squares (Proteus-style): red = 1, blue = 0; grey = no defined
  // value — a power pin (VSS/VDD), an input with nothing wired to it, or before the
  // core loads. Outputs always show their driven level; an input shows a level only
  // when a button is wired to it (idles per the button's polarity, flips on press).
  // Amber = a button is wired to a pin the firmware configured as an OUTPUT and it's
  // pressed — a contention / TRIS mistake worth flagging for the student.
  const ready=!!X, pa=ready?X.np_read_porta():0, pb=ready?X.np_read_portb():0;
  const trisA=ready?X.np_read_data(0x85):0xFF, trisB=ready?X.np_read_data(0x86):0xFF;
  for(const name in PIN){
    const p=PIN[name], isIo=/^R[AB]/.test(name), s=11;
    ctx.strokeStyle="#8b949e"; ctx.lineWidth=2.5; ctx.beginPath();
    ctx.moveTo(p.side==="L"?CHIP.x:CHIP.x+CHIP.w,p.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    let col="#6e7681";
    if(ready&&isIo){ const m=/^R([AB])([0-7])$/.exec(name), input=((m[1]==="A"?trisA:trisB)>>(+m[2]))&1;
      const btn=buttonPins.has(name)?components.find(k=>k.pin===name&&k.press):null;
      if(btn&&btn.pressed&&!input) col="#f5b301";                 // botón apretado sobre un pin de SALIDA → conflicto (TRIS mal)
      else if(!input || buttonPins.has(name)) col=pinVal(name,pa,pb)?"#f0594e":"#3f7fe0"; }
    roundRect(ctx, p.x-s/2, p.y-s/2, s, s, 3); ctx.fillStyle=col; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle="rgba(0,0,0,0.45)"; ctx.stroke();
    ctx.font=isIo?"bold 11px ui-monospace, monospace":"11px ui-monospace, monospace";
    ctx.fillStyle=isIo?"#bcd0e0":"#7c8794"; ctx.textAlign=p.side==="L"?"end":"start";
    ctx.fillText(name, p.side==="L"?p.x-s/2-6:p.x+s/2+6, p.y+3.5);
    ctx.font="10px ui-monospace, monospace"; ctx.fillStyle="#5b6470"; ctx.textAlign="center";
    ctx.fillText(p.num, p.side==="L"?CHIP.x+13:CHIP.x+CHIP.w-13, p.y+3.5);
  }
}
function drawLed(ctx,x,y,b){
  ctx.save(); ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2);
  const g=ctx.createRadialGradient(x,y,2,x,y,15);
  g.addColorStop(0,`rgba(255,90,70,${0.22+0.78*b})`); g.addColorStop(1,`rgba(110,18,18,${0.35+0.4*b})`);
  ctx.fillStyle=g; if(b>0.05){ctx.shadowColor="rgba(255,90,70,0.85)";ctx.shadowBlur=16*b;} ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle="#30363d"; ctx.stroke(); ctx.restore();
}
function drawSeven(ctx,x,y,b,W,H){
  const t=Math.round(W*0.145);
  const s=[[x+t,y,W-2*t,t],[x+W-t,y+t,t,H/2-t],[x+W-t,y+H/2,t,H/2-t],[x+t,y+H-t,W-2*t,t],
           [x,y+H/2,t,H/2-t],[x,y+t,t,H/2-t],[x+t,y+H/2-t/2,W-2*t,t]];
  ctx.save();
  ctx.fillStyle="#0a0f0c"; ctx.strokeStyle="#2c3540"; ctx.lineWidth=1.5;
  roundRect(ctx,x-14,y-14,W+28,H+28,12); ctx.fill(); ctx.stroke();
  ctx.fillStyle="rgba(255,72,60,0.10)";                       // ghost: the digit's shape is always faintly visible, like a real LED display
  for(let i=0;i<7;i++){ const r=s[i]; ctx.fillRect(r[0],r[1],r[2],r[3]); }
  for(let i=0;i<7;i++){ const v=b[i]; if(v<=0.02) continue;    // lit segments on top
    ctx.fillStyle=`rgba(255,74,62,${0.16+0.84*v})`;
    ctx.shadowColor="rgba(255,70,60,0.95)"; ctx.shadowBlur=13*v;
    const r=s[i]; ctx.fillRect(r[0],r[1],r[2],r[3]); ctx.shadowBlur=0; }
  ctx.restore();
}
function drawButton(ctx,x,y,pressed,label){
  ctx.save();
  roundRect(ctx,x,y,72,44,10);
  ctx.fillStyle=pressed?"#2ea043":"#262d36"; ctx.fill();
  ctx.lineWidth=2; ctx.strokeStyle=pressed?"#48d869":"#3a424d"; ctx.stroke();
  if(!pressed){ roundRect(ctx,x+5,y+5,62,15,7); ctx.fillStyle="rgba(255,255,255,0.05)"; ctx.fill(); }  // subtle cap highlight
  ctx.fillStyle=pressed?"#052810":"#e6edf3"; ctx.font="bold 12.5px ui-monospace, monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(label,x+36,y+22); ctx.restore();
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ===== loop =====
const canvas=document.getElementById("board"), ctx=canvas.getContext("2d"), statusEl=document.getElementById("status");
let wiring=null;
let buttonPins=new Set();   // pins that have a button wired to them (drives an input)
let components=build(LED_DIAGRAM), running=false;
let dbgOpen=true, dbgTick=0;
const view={ zoom:1, panX:0, panY:0, base:1 };   // board view transform (zoom + pan); base fits the 920-wide board to the canvas, recomputed each frame
const breakSet=new Set();
const SUBSTEPS=64;
let clockHz=4000000;
let cycleBudget=0; // carries fractional cycles so low clocks run < 1 cycle/frame
let runRealMs=0, lastTick=performance.now(); // wall-clock stopwatch: real time the sim has run, independent of the PIC clock
function frame(){
  const tNow=performance.now();
  const dtMs=Math.min(tNow-lastTick, 100); // real ms since last frame (capped so a background-tab gap can't burst)
  lastTick=tNow;
  if(running&&X){
    runRealMs += dtMs;                     // wall-clock stopwatch (real time the sim has run)
    cycleBudget += (clockHz/4)*(dtMs/1000);// cycles for the REAL time elapsed — independent of the display refresh rate
    let want=Math.floor(cycleBudget); cycleBudget-=want;
    if(want>2000000) want=2000000;        // cap so an absurd clock can't freeze the tab
    if(want>0){
      const steps=Math.min(SUBSTEPS,want), per=Math.max(1,Math.floor(want/steps));
      for(const c of components) c.reset();
      let ran=0, brk=false;
      for(let s=0;s<steps && !brk;s++){ ran+=X.np_run_cycles(per); const pa=X.np_read_porta(),pb=X.np_read_portb(); for(const c of components) c.sample(pa,pb); if(X.np_break_hit()) brk=true; }
      if(!brk && ran<want){ X.np_run_cycles(want-ran); if(X.np_break_hit()) brk=true; }
      // Persist brightness across frames (~80 ms) so a slow multiplex spanning
      // several frames still shows every digit, like the eye / real hardware.
      for(const c of components) if(c.integrate) c.integrate(dtMs);
      if(brk){ setRunning(false); if(dbgOpen) refreshDebug(); }
    }
  }
  // ---- render with a hi-DPI backing store + the zoom/pan transform ----
  // The board is authored in a fixed 920x640 space; `base` scales that to the
  // canvas width, then the user's zoom/pan is layered on. Timing is untouched —
  // this only changes how the already-computed state is drawn.
  const dpr=Math.max(1, Math.min(3, window.devicePixelRatio||1));
  const cw=canvas.clientWidth||920, ch=canvas.clientHeight||640;
  const bw=Math.round(cw*dpr), bh=Math.round(ch*dpr);
  if(canvas.width!==bw||canvas.height!==bh){ canvas.width=bw; canvas.height=bh; }
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cw,ch);
  view.base=cw/920;
  ctx.save();
  ctx.translate(view.panX, view.panY);
  ctx.scale(view.base*view.zoom, view.base*view.zoom);
  drawChip(ctx);
  for(const c of components) c.drawBody(ctx);
  drawWiring(ctx);
  ctx.restore();
  updateReadout();
  if(dbgOpen && running && (++dbgTick % 6 === 0)) refreshDebug();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ===== controls =====
function esc(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setStatus(m,c){ statusEl.textContent=m; statusEl.className="status "+(c||""); }
function enable(ids,on){ ids.forEach((id)=>document.getElementById(id).disabled=!on); }
function coreReady(){ populateLabs(); enable(["labSelect","stepBtn","step10","step100"],true); if(dbgOpen){ rebuildProg(); refreshDebug(); } }
function setDiagram(d){ components=build(d); resetView(); }
function afterHex(ok,name){ if(!ok){ setStatus("No se pudo leer "+name,"err"); return; }
  X.np_reset(); for(const c of components) if(c.idle) c.idle();
  enable(["playPauseBtn","stopBtn"],true);
  runRealMs=0; setRunning(true);
  setStatus("Cargado "+name+" ✓ — ejecutando.","ok"); breakSet.clear(); if(X) X.np_clear_breaks(); if(dbgOpen){ rebuildProg(); refreshDebug(); } }

document.getElementById("wasmFile").addEventListener("change", async (e)=>{
  const f=e.target.files[0]; if(!f) return;
  try{ await instantiate(await f.arrayBuffer()); coreReady(); setStatus("Núcleo cargado ✓ — elegí una placa o cargá un .hex.","ok"); }
  catch(err){ setStatus("Error al cargar el WASM: "+err,"err"); }
});
document.getElementById("hexFile").addEventListener("change", async (e)=>{ const f=e.target.files[0]; if(!f||!X) return; afterHex(loadHex(await f.text()),f.name); });
// Boards are set up by the teacher (via labs.js / the authoring tool), not loaded
// ad-hoc by students — so there is no diagram upload here, only the "Placa" dropdown.
function setClock(str){ document.getElementById("clock").value=str; applyClock(); }
// ===== boards / labs (demos are built in; instructor boards come from labs.js) =====
const BUILTIN_LABS = [
  { name:"Ejemplo · Parpadeo (LED en RB0)",                   group:"Ejemplos", diagram:LED_DIAGRAM, hex:BLINK_HEX, asm:BLINK_ASM,          clock:"1 kHz" },
  { name:"Ejemplo · Contador de 7 segmentos",                 group:"Ejemplos", diagram:SEG_DIAGRAM, hex:SEG_COUNTER_HEX, asm:SEG_COUNTER_ASM,    clock:"4 MHz" },
  { name:"Ejemplo · Contador multiplexado de 2 dígitos",      group:"Ejemplos", diagram:LAB_DIAGRAM, hex:MUX_COUNTER_HEX, asm:MUX_COUNTER_ASM,    clock:"4 MHz" },
  { name:"Ejemplo · Contador EEPROM (sobrevive al reinicio)",  group:"Ejemplos", diagram:SEG_DIAGRAM, hex:EEPROM_COUNTER_HEX, asm:EEPROM_COUNTER_ASM, clock:"4 MHz" },
];
// labs.js may set window.NP_LABS to authoring-tool exports ({name, group?, components})
// or full lab objects ({name, group?, diagram, hex?, clock?}). `group` is the dropdown
// heading the teacher picks; it defaults to "Trabajos Prácticos". The teacher's boards
// come first, the built-in "Ejemplos" last.
const USER_LABS = (Array.isArray(window.NP_LABS) ? window.NP_LABS : [])
  .map((d)=> d && d.components && !d.diagram ? { name:d.name||"Placa sin nombre", group:d.group, diagram:d, hex:d.hex, clock:d.clock } : d)
  .filter((l)=> l && l.diagram);
const LABS = USER_LABS.concat(BUILTIN_LABS);

function populateLabs(){
  const sel=document.getElementById("labSelect");
  let html='<option value="">— elegí una placa o ejemplo —</option>';
  const order=[], byGroup={};
  LABS.forEach((l,i)=>{ const g=l.group||"Trabajos Prácticos"; if(!byGroup[g]){ byGroup[g]=[]; order.push(g); } byGroup[g].push(i); });
  for(const g of order)
    html+=`<optgroup label="${esc(g)}">`+byGroup[g].map((i)=>`<option value="${i}">${esc(LABS[i].name)}</option>`).join("")+`</optgroup>`;
  sel.innerHTML=html;
}
document.getElementById("labSelect").addEventListener("change", (e)=>{
  const v=e.target.value; if(v===""||!X) return;
  const lab=LABS[+v];
  setClock(lab.clock||"4 MHz");
  setDiagram(lab.diagram);
  if(lab.asm){ edSrcEl.value=lab.asm; edSave(); showEditor(true); }
  if(lab.hex){
    afterHex(loadHex(lab.hex), lab.name);
    if(/eeprom/i.test(lab.name)) setStatus("Cargado "+lab.name+" ✓ — apretá Detener (■) para cortar la energía y volvé a Ejecutar; el conteo se mantiene.","ok");
  }else{
    for(const c of components) if(c.idle) c.idle();
    setStatus("Placa “"+lab.name+"” cargada ✓ — ahora cargá tu programa (.hex).","ok");
  }
});
// ===== transport: play / pause / stop trio (play stays lit while running) =====
const playPauseBtn=document.getElementById("playPauseBtn"), stopBtn=document.getElementById("stopBtn");
function setRunning(on){ running=on; playPauseBtn.classList.toggle("active", on); // .active (running) → shows the pause glyph
  playPauseBtn.setAttribute("aria-label", on?"Pausar":"Ejecutar"); playPauseBtn.title=(on?"Pausar":"Ejecutar")+" (Espacio)"; }
function play(){ if(playPauseBtn.disabled||!X||running) return; if(breakSet.has(X.np_pc())) X.np_step(); setRunning(true); }
function pause(){ if(playPauseBtn.disabled||!running) return; setRunning(false); if(dbgOpen) refreshDebug(); }
function stop(){ if(stopBtn.disabled||!X) return; setRunning(false); X.np_reset(); runRealMs=0; for(const c of components){ if(c.idle) c.idle(); if(c.clear) c.clear(); } if(dbgOpen) refreshDebug(); }
function togglePlay(){ if(running) pause(); else play(); }
playPauseBtn.addEventListener("click", togglePlay);
stopBtn.addEventListener("click", stop);

// ===== Depurador (debugger dock) =====
// Two panes; each pane independently picks any view (Programa / Datos / SFR /
// Pila / Vigilar), so a student can watch e.g. the program and a watch list at the
// same time. Below 1200px the dock un-docks beneath the board and only the left
// pane shows — the dual view is a desktop-only convenience.
const STATUS_BITS = [["C",0],["DC",1],["Z",2],["RP0",5]];
const SFRS = [
  ["W",-1],
  ["STATUS",0x03,"IRP RP1 RP0 TO PD Z DC C"],
  ["OPTION",0x81,"RBPU INTEDG T0CS T0SE PSA PS2 PS1 PS0"],
  ["INTCON",0x0B,"GIE PEIE T0IE INTE RBIE T0IF INTF RBIF"],
  ["PORTA",0x05],["PORTB",0x06],["TRISA",0x85],["TRISB",0x86],
  ["TMR0",0x01],["PCL",0x02],["PCLATH",0x0A],["FSR",0x04],
  ["EEDATA",0x9A],["EEADR",0x9B],["EECON1",0x9C],
];
const VIEW_LABELS = { prog:"Programa", data:"Datos", sfr:"SFR", stack:"Pila", watch:"Vigilar" };
const VIEW_ORDER  = ["prog","data","sfr","stack","watch"];
const NAME_ADDR={}; SFRS.forEach(([n,a])=>{ if(a>=0) NAME_ADDR[n]=a; });

// per-pane state {view, bank}, persisted so a student keeps their layout
function loadPanes(){ try{ const p=JSON.parse(localStorage.getItem("np_panes")); if(p&&p.A&&p.B&&VIEW_LABELS[p.A.view]&&VIEW_LABELS[p.B.view]) return p; }catch(e){} return {A:{view:"prog",bank:0}, B:{view:"watch",bank:0}}; }
let panes=loadPanes();
function savePanes(){ try{ localStorage.setItem("np_panes", JSON.stringify(panes)); }catch(e){} }
// is the second pane open? (desktop only; persisted) — students can close/reopen pane B
let dbgSplit=true; try{ const s=localStorage.getItem("np_split"); if(s!=null) dbgSplit=(s==="1"); }catch(e){}
const paneBody  =(id)=>document.querySelector(`.dbgPaneBody[data-pane="${id}"]`);
const paneSelect=(id)=>document.querySelector(`.paneView[data-pane="${id}"]`);
function setText(id,t){ const el=document.getElementById(id); if(el) el.textContent=t; }

// watch list (shared by both panes)
let watchList=[]; try{ watchList=JSON.parse(localStorage.getItem("np_watch")||"[]"); }catch(e){}
function saveWatch(){ try{ localStorage.setItem("np_watch", JSON.stringify(watchList)); }catch(e){} }
function resolveWatch(s){
  s=(s||"").trim(); if(!s) return null;
  const up=s.toUpperCase();
  if(up in NAME_ADDR) return {label:up, addr:NAME_ADDR[up]};
  const m=/^(?:0x)?([0-9a-f]+)$/i.exec(s); if(!m) return null;
  const addr=parseInt(m[1],16);
  if(isNaN(addr)||addr>0x1FF) return null;
  return {label:"0x"+addr.toString(16).toUpperCase(), addr};
}

// ---- view builders: each returns the HTML for a pane body ----
function progHTML(){
  let last=0; for(let a=0;a<2048;a++) if(X.np_prog_word(a)!==0x3FFF) last=a;
  const n=Math.min(2048, Math.max(16,last+2)); let rows="";
  for(let a=0;a<n;a++){
    const word=X.np_prog_word(a), dn=X.np_disasm(word);
    const txt=new TextDecoder().decode(new Uint8Array(X.memory.buffer, X.np_disasm_buffer(), dn));
    rows+=`<div class="progRow" data-a="${a}"><span class="bp${breakSet.has(a)?" on":""}"></span><span class="pa">0x${a.toString(16).toUpperCase().padStart(3,"0")}</span><span class="pw">0x${word.toString(16).toUpperCase().padStart(4,"0")}</span><span class="pm">${esc(txt)}</span></div>`;
  }
  return `<div class="dbgProg">${rows}</div>`;
}
function highlightProgIn(host){
  const cur=host.querySelector(".progRow.pc"); if(cur) cur.classList.remove("pc");
  const row=host.querySelector(`.progRow[data-a="${X.np_pc()}"]`);
  if(row){ row.classList.add("pc");
    // keep the PC row visible by scrolling the pane body only — never scrollIntoView,
    // which would scroll the whole page (it yanks the view down to the dock on mobile).
    const hr=host.getBoundingClientRect(), rr=row.getBoundingClientRect();
    if(rr.top < hr.top) host.scrollTop += (rr.top - hr.top) - 4;
    else if(rr.bottom > hr.bottom) host.scrollTop += (rr.bottom - hr.bottom) + 4;
  }
}
function dataHTML(bank){
  const base=bank*0x80; let cells="";
  for(let off=0;off<0x80;off++){
    if(off%16===0) cells+=`<span class="dlabel">0x${(base+off).toString(16).toUpperCase().padStart(2,"0")}</span>`;
    const v=X.np_read_data(base+off);
    cells+=`<span class="dcell${off<0x20?" sfr":""}" data-addr="${base+off}">${v.toString(16).toUpperCase().padStart(2,"0")}</span>`;
  }
  return `<div class="dataBankBar">Banco <button class="bankBtn${bank===0?" active":""}" data-bank="0">0</button><button class="bankBtn${bank===1?" active":""}" data-bank="1">1</button></div><div class="dbgData">${cells}</div>`;
}
function sfrHTML(){
  return `<div class="dbgSFR">`+SFRS.map(([name,addr,bits])=>{
    const v = addr<0 ? X.np_w() : X.np_read_data(addr);
    const hex="0x"+v.toString(16).toUpperCase().padStart(2,"0"), bin=v.toString(2).padStart(8,"0");
    const bh = bits ? bits.split(" ").map((bn,i)=>`<span class="${(v>>(7-i))&1?"on":""}">${bn}</span>`).join("") : "";
    return `<div class="sfrRow"><span class="sname">${name}</span><span class="sval" data-addr="${addr}">${hex}</span><span class="sbin">${bin}</span><span class="sbits">${bh}</span></div>`;
  }).join("")+`</div>`;
}
function stackHTML(){
  if(typeof X.np_stack_depth!=="function") return `<div class="dbgStack"><div class="dbgEmpty">Pila no disponible: recompilá el núcleo WASM (núcleo viejo embebido).</div></div>`;
  const depth=X.np_stack_depth(); let html=`<div class="stkHead">Pila de retorno (CALL/RETURN) · profundidad <b>${depth}</b>/8</div>`;
  for(let i=7;i>=0;i--){ const used=i<depth, top=i===depth-1; const v=used?"0x"+X.np_stack_at(i).toString(16).toUpperCase().padStart(3,"0"):"—";
    html+=`<div class="stkRow${used?" used":""}${top?" top":""}"><span class="sl">${i}</span><span class="sv">${v}</span><span class="stag">${top?"◂ tope":""}</span></div>`; }
  return `<div class="dbgStack">${html}</div>`;
}
function watchHTML(){
  let rows;
  if(!watchList.length) rows=`<div class="dbgEmpty">Agregá una dirección (0x20) o un registro (PORTB) para seguir su valor en vivo.</div>`;
  else rows=watchList.map((w,i)=>{ const v=X?X.np_read_data(w.addr):0;
    return `<div class="watchRow"><span class="wname">${esc(w.label)}</span><span class="waddr">0x${w.addr.toString(16).toUpperCase().padStart(2,"0")}</span><span class="wval">0x${v.toString(16).toUpperCase().padStart(2,"0")}</span><span class="wbin">${v.toString(2).padStart(8,"0")}</span><button class="wdel" data-i="${i}" title="Quitar">×</button></div>`; }).join("");
  return `<div class="watchBar"><input class="watchInput" type="text" placeholder="0x20 o PORTB" autocomplete="off" /><button class="watchAdd">Agregar</button></div><div class="dbgWatch">${rows}</div>`;
}
function updateWatchValues(host){
  host.querySelectorAll(".watchRow").forEach((row,i)=>{ const w=watchList[i]; if(!w) return; const v=X?X.np_read_data(w.addr):0;
    const wv=row.querySelector(".wval"), wb=row.querySelector(".wbin");
    if(wv) wv.textContent="0x"+v.toString(16).toUpperCase().padStart(2,"0");
    if(wb) wb.textContent=v.toString(2).padStart(8,"0"); });
}

// render one pane (full = rebuild markup; otherwise just refresh live values)
function renderPane(id, full){
  if(id==="B" && !dbgSplit) return;             // second pane closed → nothing to draw
  const host=paneBody(id); if(!host||!X) return;
  const v=panes[id].view;
  if(v==="prog"){ if(full || !host.querySelector(".dbgProg")) host.innerHTML=progHTML(); highlightProgIn(host); }
  else if(v==="data"){ host.innerHTML=dataHTML(panes[id].bank||0); }
  else if(v==="sfr"){ host.innerHTML=sfrHTML(); }
  else if(v==="stack"){ host.innerHTML=stackHTML(); }
  else if(v==="watch"){ const inp=host.querySelector(".watchInput");
    if(!full && inp && document.activeElement===inp) updateWatchValues(host);   // don't clobber a value being typed
    else host.innerHTML=watchHTML(); }
}
function rebuildProg(){ renderPane("A",true); renderPane("B",true); }
function refreshActiveView(){ renderPane("A",true); renderPane("B",true); }
function refreshDebug(){
  if(!X) return;
  const pc=X.np_pc(), w=X.np_w(), cyc=X.np_cycles(), st=X.np_read_data(0x03);
  setText("dbgCycles", cyc.toLocaleString("es-AR"));
  setText("dbgPC","0x"+pc.toString(16).toUpperCase().padStart(3,"0"));
  setText("dbgW","0x"+w.toString(16).toUpperCase().padStart(2,"0"));
  setText("dbgStatus","0x"+st.toString(16).toUpperCase().padStart(2,"0"));
  const fl=document.getElementById("dbgFlags"); if(fl) fl.innerHTML=STATUS_BITS.map(([n,b])=>`<span class="${(st>>b)&1?"on":""}">${n}</span>`).join("");
  renderPane("A",false); renderPane("B",false);
}

// pane view pickers
function populatePaneSelects(){
  ["A","B"].forEach(id=>{ const sel=paneSelect(id); if(!sel) return;
    sel.innerHTML=VIEW_ORDER.map(v=>`<option value="${v}">${VIEW_LABELS[v]}</option>`).join("");
    sel.value=panes[id].view;
    sel.addEventListener("change",()=>{ panes[id].view=sel.value; savePanes(); renderPane(id,true); });
  });
}
// open/close the second pane (desktop dual view); persisted so it stays as the student left it
function setSplit(on){
  dbgSplit=on;
  const pe=document.getElementById("dbgPanes"); if(pe) pe.classList.toggle("single", !on);
  try{ localStorage.setItem("np_split", on?"1":"0"); }catch(e){}
  if(on) renderPane("B", true);
}
// the dock holds two independent blocks (Depurador + Código); each opens/closes on its own,
// so a student can have the debugger and the editor visible at the same time.
let edPanelOpen=false;
function syncDock(){
  const layout=document.querySelector(".layout"); if(layout) layout.classList.toggle("no-dock", !(dbgOpen||edPanelOpen));
  const td=document.getElementById("toggleDebug"), te=document.getElementById("toggleEditor");
  if(td){ td.classList.toggle("active", dbgOpen); td.setAttribute("aria-pressed", dbgOpen?"true":"false"); }
  if(te){ te.classList.toggle("active", edPanelOpen); te.setAttribute("aria-pressed", edPanelOpen?"true":"false"); }
}
function showDebug(on){
  dbgOpen=on;
  const el=document.getElementById("dockDebug"); if(el) el.classList.toggle("hidden", !on);
  try{ localStorage.setItem("np_dock", on?"1":"0"); }catch(e){}
  syncDock();
  if(on && X){ rebuildProg(); refreshDebug(); }
}
function showEditor(on){
  edPanelOpen=on;
  const el=document.getElementById("dockEditor"); if(el) el.classList.toggle("hidden", !on);
  try{ localStorage.setItem("np_editor", on?"1":"0"); }catch(e){}
  syncDock();
}

// stepping
function snapBoard(){ if(!X) return; const pa=X.np_read_porta(), pb=X.np_read_portb(); for(const c of components){ if(c.reset)c.reset(); if(c.sample)c.sample(pa,pb); if(c.integrate)c.integrate(1); } }
function stepN(n){ if(!X) return; setRunning(false); for(let i=0;i<n;i++){ X.np_step(); if(breakSet.has(X.np_pc())) break; } snapBoard(); refreshDebug(); }
function stepOnce(){ stepN(1); }
document.getElementById("stepBtn").addEventListener("click", stepOnce);
document.getElementById("step10").addEventListener("click", ()=>stepN(10));
document.getElementById("step100").addEventListener("click", ()=>stepN(100));

// inline hex edit of a register/cell (pauses first so the live refresh can't clobber it)
function editCell(span, cur, write){
  setRunning(false);
  const inp=document.createElement("input"); inp.className="cellEdit";
  inp.value=cur.toString(16).toUpperCase().padStart(2,"0");
  span.replaceWith(inp); inp.focus(); inp.select();
  let done=false;
  const commit=(save)=>{ if(done) return; done=true; if(save){ const v=parseInt(inp.value,16); if(!isNaN(v)) write(v & 0xFF); } refreshActiveView(); };
  inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); commit(true); } else if(e.key==="Escape") commit(false); });
  inp.addEventListener("blur",()=>commit(true));
}
function addWatchFromPane(paneEl){
  const inp=paneEl.querySelector(".watchInput"); if(!inp) return;
  const w=resolveWatch(inp.value);
  if(w && !watchList.some(x=>x.addr===w.addr)){ watchList.push(w); saveWatch(); }
  renderPane("A",true); renderPane("B",true);
  const again=paneEl.querySelector(".watchInput"); if(again) again.focus();
}

// delegated interactions inside the panes (breakpoints, bank switch, watch add/del, cell edits)
const panesEl=document.getElementById("dbgPanes");
panesEl.addEventListener("click",(e)=>{
  if(!X) return;
  const paneEl=e.target.closest(".dbgPane"), id=paneEl?paneEl.dataset.pane:null;
  const prow=e.target.closest(".progRow");
  if(prow){ const a=+prow.dataset.a;
    if(breakSet.has(a)){ breakSet.delete(a); X.np_clear_break(a); } else { breakSet.add(a); X.np_set_break(a); }
    document.querySelectorAll(`.progRow[data-a="${a}"] .bp`).forEach(b=>b.classList.toggle("on", breakSet.has(a))); return; }
  const bank=e.target.closest(".bankBtn");
  if(bank && id){ panes[id].bank=+bank.dataset.bank; savePanes(); renderPane(id,true); return; }
  if(e.target.closest(".watchAdd") && paneEl){ addWatchFromPane(paneEl); return; }
  const del=e.target.closest(".wdel");
  if(del){ watchList.splice(+del.dataset.i,1); saveWatch(); renderPane("A",true); renderPane("B",true); return; }
  const cell=e.target.closest(".dcell");
  if(cell){ const addr=+cell.dataset.addr; editCell(cell, X.np_read_data(addr), (v)=>X.np_write_data(addr,v)); return; }
  const sval=e.target.closest(".sval");
  if(sval){ const addr=+sval.dataset.addr; editCell(sval, addr<0?X.np_w():X.np_read_data(addr), (v)=> addr<0?X.np_set_w(v):X.np_write_data(addr,v)); return; }
});
panesEl.addEventListener("keydown",(e)=>{ if(e.key==="Enter" && e.target.classList && e.target.classList.contains("watchInput")){ e.preventDefault(); const paneEl=e.target.closest(".dbgPane"); if(paneEl) addWatchFromPane(paneEl); } });

// dock width drag
(function dockResizeInit(){
  const handle=document.getElementById("dockResize"), layout=document.querySelector(".layout");
  if(!handle||!layout) return;
  try{ const s=localStorage.getItem("np_dock_w"); if(s) layout.style.setProperty("--dock-w", clamp(parseInt(s)||452,320,720)+"px"); }catch(e){}
  const getW=()=>parseInt(getComputedStyle(layout).getPropertyValue("--dock-w"))||452;
  let startX=0, startW=452, dragging=false;
  handle.addEventListener("pointerdown",(e)=>{ dragging=true; startX=e.clientX; startW=getW(); handle.classList.add("drag"); try{handle.setPointerCapture(e.pointerId);}catch(_){} e.preventDefault(); });
  handle.addEventListener("pointermove",(e)=>{ if(!dragging) return; layout.style.setProperty("--dock-w", clamp(startW-(e.clientX-startX),320,720)+"px"); });
  const end=()=>{ if(!dragging) return; dragging=false; handle.classList.remove("drag"); try{ localStorage.setItem("np_dock_w", getW()); }catch(e){} };
  handle.addEventListener("pointerup", end); handle.addEventListener("pointercancel", end);
})();

})();

// ===== Editor de código (ASM → .hex): compila en el navegador y se carga como un .hex =====
const ED_SAMPLE = [
  "; Contador en PORTB (LEDs RB0..RB7).",
  "; Tocá «Compilar y cargar» y mirá el conteo en la placa.",
  "    __CONFIG 0x3F10",
  "    ORG     0",
  "    bsf     STATUS,RP0    ; banco 1",
  "    clrf    TRISB         ; PORTB como salida",
  "    bcf     STATUS,RP0    ; banco 0",
  "loop",
  "    incf    PORTB,f       ; PORTB = PORTB + 1",
  "    call    demora",
  "    goto    loop",
  "demora                    ; ~65 mil ciclos de espera",
  "    clrf    0x20",
  "    clrf    0x21",
  "espera",
  "    decfsz  0x20,f",
  "    goto    espera",
  "    decfsz  0x21,f",
  "    goto    espera",
  "    return",
  "    END",
  ""
].join("\n");
const edSrcEl=document.getElementById("edSrc"), edStatusEl=document.getElementById("edStatus");
try{ const saved=localStorage.getItem("np_src"); if(saved!=null) edSrcEl.value=saved; }catch(e){}
if(!edSrcEl.value.trim()) edSrcEl.value=ED_SAMPLE;
function edSave(){ try{ localStorage.setItem("np_src", edSrcEl.value); }catch(e){} }
function edStatus(msg,cls){ edStatusEl.textContent=msg; edStatusEl.className="edStatus "+(cls||""); }
edSrcEl.addEventListener("input", edSave);
edSrcEl.addEventListener("keydown",(e)=>{ if(e.key==="Tab"){ e.preventDefault();
  const s=edSrcEl.selectionStart, en=edSrcEl.selectionEnd;
  edSrcEl.value=edSrcEl.value.slice(0,s)+"    "+edSrcEl.value.slice(en);
  edSrcEl.selectionStart=edSrcEl.selectionEnd=s+4; edSave(); } });
// (the editor lives in the right dock's "Código" block — toggled by showEditor in the Depurador section)
document.getElementById("edDownload").addEventListener("click", ()=>{
  const blob=new Blob([edSrcEl.value], {type:"text/plain;charset=utf-8"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="programa.asm"; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 1500); });
document.getElementById("edOpen").addEventListener("click", ()=>document.getElementById("edFile").click());
document.getElementById("edFile").addEventListener("change", async (e)=>{
  const f=e.target.files[0]; if(!f) return;
  try{ edSrcEl.value=await f.text(); edSave(); edStatus("Cargado “"+f.name+"” en el editor.",""); }
  catch(err){ edStatus("No se pudo leer el archivo.","err"); }
  e.target.value=""; });
document.getElementById("edBuild").addEventListener("click", ()=>{
  if(!window.NP_ASM){ edStatus("No se pudo cargar el ensamblador (asm.js).","err"); return; }
  if(!X){ edStatus("El núcleo todavía no cargó. Esperá un momento.","err"); return; }
  const res=NP_ASM.assemble(edSrcEl.value);
  if(!res.ok){ edStatus("✗ "+res.error,"err"); return; }
  const ok=loadHex(res.hex);
  afterHex(ok, "tu programa");
  edStatus(ok ? ("✓ Compilado: "+res.words.size+" instrucciones — cargado y ejecutando en la placa.")
              : "✗ El núcleo rechazó el .hex generado.", ok?"ok":"err");
});
// (breakpoint toggling, cell/SFR inline edit and watch add/remove are handled by
//  the delegated listeners on #dbgPanes in the Depurador section above.)
// ===== clock: text input + slider shortcut (1-2-5 steps, 1 Hz … 8 MHz) =====
const SPEEDS=[1,2,5,10,20,50,100,200,500,1e3,2e3,5e3,1e4,2e4,5e4,1e5,2e5,5e5,1e6,2e6,4e6,8e6];
const clockRange=document.getElementById("clockRange"); clockRange.max=SPEEDS.length-1;
function fmtHz(v){ return v>=1e6 ? (v/1e6)+" MHz" : v>=1e3 ? (v/1e3)+" kHz" : v+" Hz"; }
function nearestSpeedIdx(hz){ let bi=0,bd=Infinity; for(let i=0;i<SPEEDS.length;i++){ const d=Math.abs(Math.log(SPEEDS[i])-Math.log(hz)); if(d<bd){bd=d;bi=i;} } return bi; }
function parseClock(s){ s=(s||"").trim().toLowerCase().replace(/hz$/,"").trim(); const m=/^([0-9]*\.?[0-9]+)\s*([kmg]?)$/.exec(s); if(!m)return null; const mult={k:1e3,m:1e6,g:1e9}[m[2]]||1; return Math.round(parseFloat(m[1])*mult); }
function setClockHz(hz){ clockHz=hz; if(X) X.np_set_clock_hz(hz); const el=document.getElementById("clockVal"); el.textContent=hz.toLocaleString("es-AR")+" Hz"; el.className="status ok"; }
function applyClock(){ const v=parseClock(document.getElementById("clock").value);
  if(v&&v>0){ setClockHz(v); clockRange.value=nearestSpeedIdx(v); }
  else { const el=document.getElementById("clockVal"); el.textContent="inválido"; el.className="status err"; } }
document.getElementById("clock").addEventListener("input", applyClock);
clockRange.addEventListener("input", ()=>{ const hz=SPEEDS[+clockRange.value]; document.getElementById("clock").value=fmtHz(hz); setClockHz(hz); });
applyClock();

// ===== always-visible elapsed-time (mm:ss:ms) + cycle counter =====
function fmtTime(sec){ if(!isFinite(sec)||sec<0) sec=0; const ms=Math.floor(sec*1000);
  return String(Math.floor(ms/60000)).padStart(2,"0")+":"+String(Math.floor(ms/1000)%60).padStart(2,"0")+":"+String(ms%1000).padStart(3,"0"); }
let simReadoutEl=null;
function updateReadout(){ (simReadoutEl||(simReadoutEl=document.getElementById("simReadout"))).textContent=fmtTime(runRealMs/1000); }

// ===== drag a .hex onto the board to load it =====
const stageEl=document.querySelector(".stage");
["dragenter","dragover"].forEach((ev)=>stageEl.addEventListener(ev,(e)=>{ e.preventDefault(); stageEl.classList.add("drop"); }));
stageEl.addEventListener("dragleave",(e)=>{ if(!stageEl.contains(e.relatedTarget)) stageEl.classList.remove("drop"); });
stageEl.addEventListener("drop", async (e)=>{ e.preventDefault(); stageEl.classList.remove("drop");
  const f=e.dataTransfer&&e.dataTransfer.files[0]; if(!f) return;
  if(!X){ setStatus("Cargá el núcleo primero.","err"); return; }
  if(!/\.hex$/i.test(f.name)){ setStatus("Arrastrá un archivo .hex.","err"); return; }
  afterHex(loadHex(await f.text()), f.name); });

// ===== keyboard: space toggles play / pause =====
window.addEventListener("keydown",(e)=>{
  if(e.code==="Space" && !/^(INPUT|SELECT|TEXTAREA|BUTTON)$/.test(e.target.tagName)){
    if(!playPauseBtn.disabled){ e.preventDefault(); togglePlay(); }
  }
});

// ===== board view: zoom + pan + button press (pointer events for mouse & touch) =====
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function boardMetrics(){ const r=canvas.getBoundingClientRect(); return { r, base:r.width/920, s:(r.width/920)*view.zoom }; }
function screenToBoard(clientX,clientY){ const {r,s}=boardMetrics(); return [ (clientX-r.left-view.panX)/s, (clientY-r.top-view.panY)/s ]; }
function clampPan(){ const {r}=boardMetrics(); const cw=r.width, ch=r.height, boardW=cw*view.zoom, boardH=ch*view.zoom;
  view.panX=clamp(view.panX, Math.min(0,cw-boardW), 0);
  view.panY=clamp(view.panY, Math.min(0,ch-boardH), 0); }
function updateZoomLabel(){ const el=document.getElementById("zoomLabel"); if(el) el.textContent=Math.round(view.zoom*100)+"%"; }
function setZoom(z, cx, cy){            // cx,cy = focal point (client coords); default = board centre
  const {r,base}=boardMetrics();
  if(cx==null){ cx=r.left+r.width/2; cy=r.top+r.height/2; }
  const nz=clamp(z,1,6); if(Math.abs(nz-view.zoom)<1e-4){ clampPan(); updateZoomLabel(); return; }
  const s0=base*view.zoom, s1=base*nz, bx=(cx-r.left-view.panX)/s0, by=(cy-r.top-view.panY)/s0;
  view.zoom=nz; view.panX=(cx-r.left)-bx*s1; view.panY=(cy-r.top)-by*s1;
  clampPan(); updateZoomLabel();
}
function zoomBy(f, cx, cy){ setZoom(view.zoom*f, cx, cy); }
function resetView(){ view.zoom=1; view.panX=0; view.panY=0; updateZoomLabel(); }

const pointers=new Map();   // pointerId -> {x,y}; tracked for pinch-zoom + pan
let panning=false, panLast=null, pinchDist=0, pressedComp=null;
function releasePresses(){ if(pressedComp&&pressedComp.press) pressedComp.press(false); pressedComp=null;
  for(const c of components) if(c.press) c.press(false); }
canvas.addEventListener("pointerdown",(e)=>{
  if(canvas.setPointerCapture) try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){ panning=false; panLast=null; canvas.classList.remove("panning");
    const p=[...pointers.values()]; pinchDist=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y); releasePresses(); return; }
  const [mx,my]=screenToBoard(e.clientX,e.clientY); pressedComp=null;
  for(const c of components) if(c.hit&&c.hit(mx,my)){ pressedComp=c; c.press(true); break; }
  if(!pressedComp){ panning=true; panLast={x:e.clientX,y:e.clientY}; canvas.classList.add("panning"); }
});
canvas.addEventListener("pointermove",(e)=>{
  if(pointers.has(e.pointerId)) pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pointers.size===2){ const p=[...pointers.values()], d=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y);
    if(pinchDist>0) zoomBy(d/pinchDist, (p[0].x+p[1].x)/2, (p[0].y+p[1].y)/2); pinchDist=d; return; }
  if(panning&&panLast){ view.panX+=e.clientX-panLast.x; view.panY+=e.clientY-panLast.y; panLast={x:e.clientX,y:e.clientY}; clampPan(); }
});
function endPointer(e){ pointers.delete(e.pointerId); if(pointers.size<2) pinchDist=0;
  if(pointers.size===0){ panning=false; panLast=null; canvas.classList.remove("panning"); releasePresses(); } }
canvas.addEventListener("pointerup", endPointer);
canvas.addEventListener("pointercancel", endPointer);
canvas.addEventListener("wheel",(e)=>{ e.preventDefault(); zoomBy(e.deltaY<0?1.12:1/1.12, e.clientX, e.clientY); }, {passive:false});
canvas.addEventListener("dblclick",(e)=>{ if(view.zoom>1.01) resetView(); else setZoom(2.2, e.clientX, e.clientY); });
document.getElementById("zoomIn").addEventListener("click",()=>zoomBy(1.25));
document.getElementById("zoomOut").addEventListener("click",()=>zoomBy(1/1.25));
document.getElementById("zoomFit").addEventListener("click", resetView);
window.addEventListener("resize", clampPan);

// ===== theme toggle (dark / light, persisted) =====
(function(){
  const root=document.documentElement, btn=document.getElementById("themeBtn");
  const meta=document.querySelector('meta[name="theme-color"]');
  function paintMeta(){ if(meta) meta.setAttribute("content", getComputedStyle(root).getPropertyValue("--bg").trim() || "#14161c"); }
  paintMeta();
  if(btn) btn.addEventListener("click", ()=>{
    const t = root.getAttribute("data-theme")==="dark" ? "light" : "dark";
    root.setAttribute("data-theme", t);
    try{ localStorage.setItem("np_theme", t); }catch(e){}
    paintMeta();
  });
})();

// ===== embedded-core auto-load =====
window.addEventListener("DOMContentLoaded", async ()=>{
  if(window.NP_WASM_BASE64){
    try{ await instantiate(b64ToBytes(window.NP_WASM_BASE64)); coreReady();
      document.getElementById("wasmWrap").classList.add("hidden");
      setStatus("Núcleo listo ✓ — elegí una placa o ejemplo, o cargá un .hex.","ok"); return;
    }catch(err){ setStatus("Falló el núcleo incrustado: "+err,"err"); }
  }
  setStatus("Cargá el núcleo (.wasm) para empezar — o incrustralo (ver runtime/README.md).");
});

// PWA: register the service worker (offline + installable). Needs https or localhost.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
