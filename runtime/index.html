<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#0d1117" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<title>SimuPIC — PIC16F628A simulator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }

  /* ===== themes: two palettes, friendly / classroom ===== */
  [data-theme="dark"]{
    color-scheme: dark;
    --bg:#14161c; --surface:#1c2027; --surface-2:#242a33; --surface-3:#2d343f;
    --border:#2e3540; --border-soft:#272d37;
    --text:#eef1f6; --text-dim:#9aa6b4; --text-faint:#69727f;
    --accent:#7c8cff; --accent-strong:#6a7bff; --accent-contrast:#ffffff; --accent-soft:rgba(124,140,255,.18);
    --ok:#54cd8c; --err:#ff6b6b; --purple:#cda9ff;
    --board:#0e1f17; --board-border:#2e3540;
    --code-bg:#0b0f15; --code-border:#222a34; --code-row-hover:#161b22;
    --code-text:#e6edf3; --code-addr:#6e7681; --code-word:#7cc7ff; --pc-row:rgba(84,205,140,.20);
    --shadow:0 12px 34px rgba(0,0,0,.38); --shadow-sm:0 2px 8px rgba(0,0,0,.28);
  }
  [data-theme="light"]{
    color-scheme: light;
    --bg:#eef1f8; --surface:#ffffff; --surface-2:#f1f4fa; --surface-3:#e6ecf5;
    --border:#dde3ee; --border-soft:#e8ecf4;
    --text:#1b2330; --text-dim:#586271; --text-faint:#8b94a3;
    --accent:#5868f5; --accent-strong:#4856e8; --accent-contrast:#ffffff; --accent-soft:rgba(88,104,245,.12);
    --ok:#1a9d5f; --err:#e5484d; --purple:#7c4def;
    --board:#0e1f17; --board-border:#cfd6e2;
    --code-bg:#f3f6fc; --code-border:#dde3ee; --code-row-hover:#e9eef7;
    --code-text:#1b2330; --code-addr:#8b94a3; --code-word:#3b5bdb; --pc-row:rgba(26,157,95,.16);
    --shadow:0 12px 30px rgba(40,55,90,.12); --shadow-sm:0 2px 8px rgba(40,55,90,.08);
  }

  body{
    margin:0; min-height:100vh; color:var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1100px 380px at 50% -120px, var(--accent-soft), transparent 70%), var(--bg);
    transition: background-color .2s ease, color .2s ease;
  }

  /* ===== app bar ===== */
  .appbar{ position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:12px;
    padding:11px 20px; background:var(--surface); border-bottom:1px solid var(--border); box-shadow:var(--shadow-sm); }
  .brand{ display:flex; align-items:center; gap:9px; }
  .brand .logo{ color:var(--accent); }
  .brand-name{ font-size:17px; font-weight:700; letter-spacing:.01em; }
  .brand-tag{ font-size:11px; font-weight:600; color:var(--accent); background:var(--accent-soft);
    border-radius:999px; padding:2px 9px; letter-spacing:.02em; }
  .appbar-spacer{ flex:1; }
  .iconbtn{ width:38px; height:38px; display:grid; place-items:center; border-radius:11px;
    background:var(--surface-2); border:1px solid var(--border); color:var(--text-dim); cursor:pointer;
    transition:background .12s, color .12s; }
  .iconbtn:hover{ background:var(--surface-3); color:var(--text); }
  [data-theme="dark"] .icon-moon{ display:none; }
  [data-theme="light"] .icon-sun{ display:none; }

  /* ===== layout ===== */
  .layout{ display:flex; gap:20px; align-items:flex-start; max-width:1320px; margin:0 auto; padding:20px; }
  .rail{ width:288px; flex:0 0 288px; display:flex; flex-direction:column; gap:14px; position:sticky; top:74px; }
  .stage{ flex:1 1 auto; min-width:0; display:flex; flex-direction:column; align-items:center; gap:14px; }

  /* ===== cards / controls ===== */
  .card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; box-shadow:var(--shadow-sm); }
  .card-title{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-faint); margin:0 0 10px; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:7px;
    background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:11px;
    padding:9px 14px; font-size:13.5px; font-weight:500; font-family:inherit; cursor:pointer;
    transition:background .12s, border-color .12s, transform .04s; }
  .btn:hover{ background:var(--surface-3); }
  .btn:active{ transform:translateY(1px); }
  .btn:disabled{ opacity:.45; cursor:not-allowed; }
  .btn-primary{ background:var(--accent); border-color:transparent; color:var(--accent-contrast); box-shadow:0 4px 14px var(--accent-soft); }
  .btn-primary:hover{ background:var(--accent-strong); }
  .btn-block{ display:flex; width:100%; }
  .btn-row{ display:flex; gap:8px; }
  .btn-row .btn{ flex:1; }
  .file-list{ display:flex; flex-direction:column; gap:8px; }
  #wasmWrap{ display:block; }
  #wasmWrap.hidden{ display:none; }
  input[type=file]{ display:none; }
  .select, .input{ width:100%; background:var(--surface-2); color:var(--text);
    border:1px solid var(--border); border-radius:10px; padding:9px 11px; font-size:13.5px; font-family:inherit; }
  .select{ cursor:pointer; }
  .select:disabled{ opacity:.55; cursor:not-allowed; }
  .input{ font-family:ui-monospace, monospace; }
  .field{ margin-top:12px; }
  .field>label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px; }
  #clockVal{ display:block; margin-top:6px; }
  .range{ width:100%; margin-top:9px; accent-color:var(--accent); cursor:pointer; }
  .readout{ margin-top:11px; font:12px/1 ui-monospace, monospace; color:var(--text-dim); letter-spacing:.02em; }
  .stage.drop .board-wrap{ outline:2px dashed var(--accent); outline-offset:6px; border-radius:18px; }

  .status{ font-size:12px; color:var(--text-dim); }
  .status.ok{ color:var(--ok); }
  .status.err{ color:var(--err); }
  #status{ background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:11px 13px; box-shadow:var(--shadow-sm); line-height:1.45; }

  /* ===== board ===== */
  .board-wrap{ width:100%; display:flex; justify-content:center; }
  #board{ display:block; width:100%; max-width:920px; height:auto; aspect-ratio:920/640;
    background:var(--board); border:1px solid var(--board-border); border-radius:18px; box-shadow:var(--shadow); }

  /* ===== debugger ===== */
  .dbgToggle{ align-self:center; background:var(--surface); color:var(--text-dim);
    border:1px solid var(--border); border-radius:11px; padding:8px 16px; font-size:13px; font-weight:600;
    font-family:inherit; cursor:pointer; box-shadow:var(--shadow-sm); transition:background .12s,color .12s; }
  .dbgToggle:hover{ background:var(--surface-2); color:var(--text); }
  .dbgToggle:disabled{ opacity:.45; cursor:not-allowed; }
  .dbgPanel{ width:100%; max-width:920px; box-sizing:border-box; background:var(--surface);
    border:1px solid var(--border); border-radius:16px; padding:14px 16px; box-shadow:var(--shadow-sm);
    font-family:ui-monospace, monospace; font-size:12px; color:var(--text-dim); }
  .dbgPanel.hidden{ display:none; }
  .dbgHeader{ display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center; }
  .dbgHeader b{ color:var(--text); font-weight:700; }
  .dbgFlags{ display:inline-flex; gap:4px; }
  .dbgFlags span{ padding:1px 6px; border-radius:5px; background:var(--surface-2); color:var(--text-faint); }
  .dbgFlags span.on{ background:var(--accent-soft); color:var(--accent); }
  #stepBtn, #step10, #step100{ background:var(--surface-2); color:var(--text); border:1px solid var(--border);
    border-radius:9px; padding:5px 12px; font-size:12px; font-family:inherit; cursor:pointer; transition:background .12s; }
  #stepBtn:hover, #step10:hover, #step100:hover{ background:var(--surface-3); }
  #stepBtn:disabled, #step10:disabled, #step100:disabled{ opacity:.45; cursor:not-allowed; }
  .dbgTabs{ display:flex; gap:5px; margin:12px 0 8px; }
  .dbgTab{ background:transparent; color:var(--text-dim); border:1px solid transparent; border-radius:9px;
    padding:6px 13px; font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .12s,color .12s; }
  .dbgTab:hover{ background:var(--surface-2); color:var(--text); }
  .dbgTab.active{ background:var(--accent-soft); color:var(--accent); }
  .dbgView.hidden{ display:none; }
  .dbgProg{ max-height:240px; overflow-y:auto; border:1px solid var(--code-border); border-radius:10px; background:var(--code-bg); }
  .progRow{ display:flex; gap:12px; padding:2px 10px; cursor:pointer; }
  .progRow:hover{ background:var(--code-row-hover); }
  .progRow.pc{ background:var(--pc-row); }
  .progRow .bp{ width:9px; height:9px; border-radius:50%; border:1px solid var(--border); flex:0 0 auto; align-self:center; }
  .progRow .bp.on{ background:var(--err); border-color:var(--err); }
  .progRow .pa{ color:var(--code-addr); width:46px; }
  .progRow .pw{ color:var(--code-word); width:56px; }
  .progRow .pm{ color:var(--code-text); }
  .dataBankBar{ color:var(--text-faint); font-size:11px; margin-bottom:6px; display:flex; gap:6px; align-items:center; }
  .bankBtn{ background:var(--surface-2); color:var(--text-dim); border:1px solid var(--border); border-radius:7px; padding:3px 10px; font-size:11px; font-family:inherit; cursor:pointer; }
  .bankBtn.active{ background:var(--accent-soft); color:var(--accent); border-color:transparent; }
  .dbgData{ display:grid; grid-template-columns:auto repeat(16,1fr); gap:2px 6px; background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:9px; font-size:11px; }
  .dbgData .dlabel{ color:var(--code-addr); padding-right:4px; }
  .dbgData .dcell{ color:var(--code-text); text-align:center; cursor:pointer; border-radius:3px; }
  .dbgData .dcell.sfr{ color:var(--purple); }
  .dbgData .dcell:hover{ outline:1px solid var(--accent); }
  .dbgSFR{ background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:7px 9px; }
  .sfrRow{ display:flex; gap:10px; align-items:center; padding:1px 0; }
  .sfrRow .sname{ color:var(--text-dim); width:64px; }
  .sfrRow .sval{ color:var(--code-text); width:46px; cursor:pointer; border-radius:3px; }
  .sfrRow .sval:hover{ outline:1px solid var(--accent); }
  .sfrRow .sbin{ color:var(--code-addr); width:72px; }
  .sfrRow .sbits{ display:inline-flex; gap:3px; flex-wrap:wrap; }
  .sfrRow .sbits span{ padding:0 4px; border-radius:3px; background:var(--surface-2); color:var(--text-faint); font-size:10px; }
  .sfrRow .sbits span.on{ background:var(--accent-soft); color:var(--accent); }
  .watchBar{ display:flex; gap:6px; margin-bottom:6px; }
  .watchBar input{ flex:1 1 auto; min-width:0; background:var(--code-bg); color:var(--code-text); border:1px solid var(--border); border-radius:8px; padding:6px 9px; font-family:ui-monospace,monospace; font-size:12px; }
  .watchBar button{ background:var(--surface-2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:6px 13px; font-size:12px; font-family:inherit; cursor:pointer; }
  .watchBar button:hover{ background:var(--surface-3); }
  .dbgWatch{ background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:7px 9px; min-height:28px; }
  .watchEmpty{ color:var(--text-faint); font-size:11px; line-height:1.4; }
  .watchRow{ display:flex; gap:10px; align-items:center; padding:1px 0; }
  .watchRow .wname{ color:var(--accent); width:72px; }
  .watchRow .waddr{ color:var(--code-addr); width:46px; }
  .watchRow .wval{ color:var(--code-text); width:46px; }
  .watchRow .wbin{ color:var(--code-addr); width:72px; }
  .watchRow .wdel{ margin-left:auto; background:none; border:none; color:var(--text-faint); cursor:pointer; font-size:15px; line-height:1; }
  .watchRow .wdel:hover{ color:var(--err); }
  .cellEdit{ width:34px; background:var(--surface); color:var(--accent); border:1px solid var(--accent); border-radius:4px; font-family:ui-monospace,monospace; font-size:11px; padding:0 2px; }
  .dbgStack{ background:var(--code-bg); border:1px solid var(--code-border); border-radius:10px; padding:8px 10px; }
  .stkHead{ color:var(--text-faint); font-size:11px; margin-bottom:7px; }
  .stkHead b{ color:var(--text); }
  .stkRow{ display:flex; gap:10px; align-items:center; padding:2px 5px; border-radius:4px; }
  .stkRow.top{ background:var(--accent-soft); }
  .stkRow .sl{ width:16px; text-align:right; color:var(--code-addr); }
  .stkRow .sv{ width:60px; color:var(--code-addr); }
  .stkRow.used .sv{ color:var(--code-word); }
  .stkRow .stag{ color:var(--accent); font-size:11px; }

  /* ===== responsive ===== */
  @media (max-width: 920px){
    .layout{ flex-direction:column; padding:14px; gap:14px; }
    .rail{ width:100%; flex:none; position:static; flex-direction:row; flex-wrap:wrap; }
    .rail .card{ flex:1 1 240px; }
    .rail>#status{ flex:1 1 100%; }
    .stage{ width:100%; }
  }
</style>
<script>
  /* Apply the saved / preferred theme before first paint (no flash of the wrong theme). */
  (function(){
    try{
      var t = localStorage.getItem("np_theme");
      if(!t) t = (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches) ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", t);
    }catch(e){ document.documentElement.setAttribute("data-theme","dark"); }
  })();
</script>
</head>
<body>
  <header class="appbar">
    <div class="brand">
      <svg class="logo" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
        <rect x="5.5" y="5.5" width="13" height="13" rx="3" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="12" cy="12" r="2.3" fill="currentColor"/>
        <path d="M9 5.5V2.6M12 5.5V2.6M15 5.5V2.6M9 21.4v-2.9M12 21.4v-2.9M15 21.4v-2.9M5.5 9H2.6M5.5 12H2.6M5.5 15H2.6M21.4 9h-2.9M21.4 12h-2.9M21.4 15h-2.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">SimuPIC</span>
      <span class="brand-tag">PIC16F628A</span>

    <div class="appbar-spacer"></div>
    <button id="themeBtn" class="iconbtn" title="Cambiar tema (claro / oscuro)" aria-label="Cambiar tema">
      <svg class="icon-sun" viewBox="0 0 24 24" width="19" height="19" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor"/><path d="M12 2.4v2.5M12 19.1v2.5M2.4 12h2.5M19.1 12h2.5M5.2 5.2l1.8 1.8M17 17l1.8 1.8M18.8 5.2L17 7M7 17l-1.8 1.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="19" height="19" aria-hidden="true"><path d="M20.5 14.8A8.2 8.2 0 1 1 9.2 3.5a6.4 6.4 0 0 0 11.3 11.3z" fill="currentColor"/></svg>
    </button>
  </header>

  <div class="layout">
    <aside class="rail">
      <div class="card">
        <div class="card-title">Placa</div>
        <select id="labSelect" class="select" disabled></select>
      </div>

      <div class="card">
        <div class="card-title">Simulación</div>
        <div class="btn-row">
          <button id="runBtn" class="btn btn-primary" disabled>Ejecutar</button>
          <button id="resetBtn" class="btn" disabled>Reiniciar</button>

      </div>

      <div id="status" class="status">Cargando núcleo…</div>

    <main class="stage">
      <div class="board-wrap">

      <button id="dbgToggle" class="dbgToggle" disabled>▸ Depurador</button>

          <button id="stepBtn" disabled>Paso ▸</button>
          <button id="step10" disabled>×10</button>
          <button id="step100" disabled>×100</button>
        </div>
        <div class="dbgTabs">
          <button class="dbgTab active" data-view="prog">Programa</button>
          <button class="dbgTab" data-view="data">Datos</button>
          <button class="dbgTab" data-view="sfr">SFR</button>
          <button class="dbgTab" data-view="stack">Pila</button>
          <button class="dbgTab" data-view="watch">Vigilar</button>
        </div>
        <div id="view-prog" class="dbgView"><div id="dbgProg" class="dbgProg"></div></div>
        <div id="view-data" class="dbgView hidden">
          <div class="dataBankBar">Banco
            <button id="bank0" class="bankBtn active">0</button><button id="bank1" class="bankBtn">1</button>
          </div>
          <div id="dbgData" class="dbgData"></div>

          </div>
          <div id="dbgWatch" class="dbgWatch"></div>
        </div>
      </div>
    </main>
  </div>

const PIN = {};
(function () {
  const pitch = (CHIP.h - 44) / 8;
  for (let i = 0; i < 9; i++) {
    const y = CHIP.y + 22 + i * pitch;
    PIN[LEFT[i]] = { x: CHIP.x - 16, y, side: "L", num: i + 1 };
    PIN[RIGHT[i]] = { x: CHIP.x + CHIP.w + 16, y, side: "R", num: 18 - i };
  }
})();

// ===== wasm glue =====
let X = null, MEM = null;
const enc = new TextEncoder();
function pinIndex(n){ const m=/^R([AB])([0-7])$/.exec(n||""); return m?(m[1]==="B"?8:0)+(+m[2]):-1; }
function pinVal(n,pa,pb){ const i=pinIndex(n); if(i<0)return 0; return i<8?(pa>>i)&1:(pb>>(i-8))&1; }
async function instantiate(bytes){ const {instance}=await WebAssembly.instantiate(bytes,{}); X=instance.exports; MEM=X.memory; }
function loadHex(text){
  const d=enc.encode(text);
  if(d.length>X.np_hex_buffer_len()) return false;
  new Uint8Array(MEM.buffer, X.np_hex_buffer(), d.length).set(d);
  return X.np_load_hex(d.length)===1;
}
function b64ToBytes(b64){ const s=atob(b64),a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }

// ===== components (sub-frame sampled for honest multiplexing) =====
// Labels-only board: no wires. Each component carries a pin badge (LED / button
// → its pin; 7-seg → its segment pins + common), so students read the connection
// by name and the layout is free to place parts wherever is clearest. build()
// computes geometry + badge specs only; the sample/integrate timing is unchanged.
function rangeLabel(pins){
  const m=pins.map(p=>/^R([AB])([0-9])$/.exec(p));
  if(m.every(Boolean) && m.every((x,i)=> x[1]===m[0][1] && (+x[2])===(+m[0][2]+i)))
    return pins[0]+"–"+pins[pins.length-1];
  return pins.join(" ");
}
function build(diagram){
  wiring = { labels:[] }; buttonPins.clear();
  const segCount=diagram.components.filter(c=>c.type==="sevenseg").length;
  const big=segCount<=2;
  const SW=big?116:94, SH=big?140:124, GAP=big?42:28;
  const DISP_TOP=446;
  const totalW=segCount*SW+Math.max(0,segCount-1)*GAP, startX=(920-totalW)/2;
  let si=0; const displays=[];
  const objs=diagram.components.map((c)=>{
    if(c.type==="led"){
      const p=PIN[c.pin]||{x:CHIP.x,y:CHIP.y}; const dir=p.side==="R"?1:-1;
      const pos={x:p.x+dir*52, y:p.y};
      wiring.labels.push({x:pos.x+dir*36, y:pos.y, text:c.pin, kind:"pin"});
      if(c.label) wiring.labels.push({x:pos.x, y:pos.y-23, text:c.label, kind:"cap"});
      return {on:0,n:0,b:0,reset(){this.on=0;this.n=0;},
        sample(pa,pb){ const lit=c.activeLow?pinVal(c.pin,pa,pb)===0:pinVal(c.pin,pa,pb)===1; if(lit)this.on++; this.n++; },
        integrate(dt){ const d=this.n?this.on/this.n:0; this.b+=(d-this.b)*(1-Math.exp(-dt/45)); },
        drawBody(ctx){ drawLed(ctx,pos.x,pos.y,this.b); } };
    }
    if(c.type==="sevenseg"){
      const pos={x: startX + (si++)*(SW+GAP), y:DISP_TOP};
      displays.push({pos, W:SW, H:SH, pins:c.pins, common:c.common});
      // Honest persistence of vision for multiplexed displays. Each frame the segment
      // brightness decays toward 0 with a ~45 ms time constant (the eye's persistence)
      // and is pulled to full whenever the segment is actually lit (its digit selected
      // AND the segment driven). So a fast mux fuses to a solid, bright display, while a
      // mux slower than flicker fusion visibly flickers — exactly like real hardware,
      // and unlike Proteus which hides a slow refresh. selN = sub-steps this digit was
      // selected this frame; the decay is time-based, so it's frame-rate-agnostic.
      return {seg:[0,0,0,0,0,0,0],selN:0,b:[0,0,0,0,0,0,0],
        reset(){this.seg=[0,0,0,0,0,0,0];this.selN=0;},
        sample(pa,pb){ const sel=c.common?(c.commonActiveLow?pinVal(c.common,pa,pb)===0:pinVal(c.common,pa,pb)===1):true;
          if(sel){ this.selN++; for(let i=0;i<7;i++) if(pinVal(c.pins[i],pa,pb)===1) this.seg[i]++; } },
        integrate(dt){ const k=Math.exp(-dt/45);
          for(let i=0;i<7;i++){ const lit=(this.selN>0 && this.seg[i]/this.selN>=0.5)?1:0; this.b[i]=Math.max(this.b[i]*k, lit); } },
        drawBody(ctx){ drawSeven(ctx,pos.x,pos.y,this.b,SW,SH); } };
    }
    if(c.type==="button"){
      const p=PIN[c.pin]||{x:CHIP.x,y:CHIP.y}; const dir=p.side==="R"?1:-1;
      const bw=72, bh=44, pos={x:p.x+dir*84-(dir<0?bw:0), y:p.y-bh/2};
      buttonPins.add(c.pin);
      if(c.label) wiring.labels.push({x:pos.x+bw/2, y:pos.y+bh+13, text:c.pin, kind:"pin"});
      return {pressed:false,reset(){},sample(){},
        idle(){ if(X) X.np_set_pin(pinIndex(c.pin), c.activeLow?1:0); },
        press(v){ this.pressed=v; if(X) X.np_set_pin(pinIndex(c.pin), (v?!c.activeLow:c.activeLow)?1:0); },
        hit(mx,my){ return mx>=pos.x&&mx<=pos.x+bw&&my>=pos.y&&my<=pos.y+bh; },
        drawBody(ctx){ drawButton(ctx,pos.x,pos.y,this.pressed,c.label||c.pin); } };
    }
    return {reset(){},sample(){},drawBody(){}};
  });
  // 7-seg pin labels: each display shows its own "com" pin, and the segment→pin
  // map (a–g) is shown once below the row when the displays share segment pins
  // (the usual multiplexed case); otherwise a per-display legend.
  if(displays.length){
    const p0=displays[0].pins;
    const allSame=displays.every(d=>d.pins.length===p0.length && d.pins.every((v,i)=>v===p0[i]));
    if(allSame){
      for(const d of displays) if(d.common)
        wiring.labels.push({x:d.pos.x+d.W/2, y:d.pos.y+d.H+11, text:"com "+d.common, kind:"pin"});
      const yKey=Math.max(...displays.map(d=>d.pos.y+d.H)) + (displays.some(d=>d.common)?24:11);
      const L=displays[0].pos.x, R=displays[displays.length-1].pos.x+displays[displays.length-1].W;
      wiring.labels.push({x:(L+R)/2, y:yKey, kind:"segkey", pins:p0});
    } else {
      for(const d of displays)
        wiring.labels.push({x:d.pos.x+d.W/2, y:d.pos.y+d.H+11, kind:"seglegend",
          entries:[...d.pins.map((p,i)=>["abcdefg"[i]||"?",p]), ...(d.common?[["com",d.common]]:[])]});
    }
  }
  return objs;
}

// ===== drawing =====
// Label layer: a pin badge on each component (LED/button → pin, 7-seg → segment
// pins + common). No wires — the connection is read by name, matching the pin
// names on the chip. Drawn on top so it stays legible.
function drawWiring(ctx){
  if(!wiring) return;
  ctx.save();
  for(const lb of wiring.labels){
    if(lb.kind==="segkey") drawSegKey(ctx,lb);
    else if(lb.kind==="seglegend") drawSegLegend(ctx,lb);
    else if(lb.kind==="cap"){ ctx.font="9px ui-monospace, monospace"; ctx.fillStyle="#8fb3a0"; ctx.textAlign="center"; ctx.textBaseline="alphabetic"; ctx.fillText(lb.text, lb.x, lb.y); }
    else drawPinBadge(ctx, lb.x, lb.y, lb.text);
  }
  ctx.restore();
}
function drawPinBadge(ctx,x,y,text){
  ctx.font="bold 10px ui-monospace, monospace";
  const w=ctx.measureText(text).width+12, h=16, bx=x-w/2, by=y-h/2;
  roundRect(ctx,bx,by,w,h,5); ctx.fillStyle="rgba(16,34,26,0.92)"; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle="#3f7a5c"; ctx.stroke();
  ctx.fillStyle="#bfe6d0"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(text,x,y); ctx.textBaseline="alphabetic";
}
// horizontal segment→pin key (a RB1 · b RB2 · … · g RB7), shown once for displays
// that share segment pins. Segment letter dim, pin name bright.
function drawSegKey(ctx,lb){
  const letters="abcdefg";
  ctx.font="8.5px ui-monospace, monospace";
  const cellW=lb.pins.map((p,i)=>ctx.measureText((letters[i]||"?")+" "+p).width);
  const sep=10, total=cellW.reduce((a,b)=>a+b,0)+sep*(lb.pins.length-1);
  const padX=11, h=18, w=total+padX*2, bx=lb.x-w/2, by=lb.y;
  roundRect(ctx,bx,by,w,h,7); ctx.fillStyle="rgba(16,34,26,0.92)"; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle="#3f7a5c"; ctx.stroke();
  ctx.textBaseline="middle"; ctx.textAlign="left"; let x=bx+padX;
  for(let i=0;i<lb.pins.length;i++){
    const l=letters[i]||"?";
    ctx.fillStyle="#7d9b8a"; ctx.fillText(l, x, by+h/2);
    ctx.fillStyle="#bfe6d0"; ctx.fillText(lb.pins[i], x+ctx.measureText(l+" ").width, by+h/2);
    x+=cellW[i]+sep;
  }
  ctx.textBaseline="alphabetic";
}
// 2-column segment legend per display (fallback when displays use different pins).
function drawSegLegend(ctx,lb){
  ctx.font="8.5px ui-monospace, monospace";
  const e=lb.entries, rows=Math.ceil(e.length/2), c1=e.slice(0,rows), c2=e.slice(rows);
  const cw=arr=>arr.length?Math.max(...arr.map(([l,p])=>ctx.measureText(l+" "+p).width)):0;
  const w1=cw(c1), w2=cw(c2), colGap=12, padX=10, padY=5, lineH=10;
  const w=padX*2+w1+(c2.length?colGap+w2:0), h=padY*2+rows*lineH, bx=lb.x-w/2, by=lb.y;
  roundRect(ctx,bx,by,w,h,6); ctx.fillStyle="rgba(16,34,26,0.92)"; ctx.fill();
  ctx.lineWidth=1; ctx.strokeStyle="#3f7a5c"; ctx.stroke();
  ctx.textBaseline="middle"; ctx.textAlign="left";
  const drawCol=(col,cx)=>col.forEach(([l,p],i)=>{ const cy=by+padY+i*lineH+lineH/2;
    ctx.fillStyle="#7d9b8a"; ctx.fillText(l, cx, cy);
    ctx.fillStyle="#bfe6d0"; ctx.fillText(p, cx+ctx.measureText(l+" ").width, cy); });
  drawCol(c1, bx+padX); if(c2.length) drawCol(c2, bx+padX+w1+colGap);
  ctx.textBaseline="alphabetic";
}
function drawChip(ctx){
  ctx.fillStyle="#15191f"; ctx.strokeStyle="#454d57"; ctx.lineWidth=2;
  roundRect(ctx,CHIP.x,CHIP.y,CHIP.w,CHIP.h,8); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(CHIP.x+CHIP.w/2,CHIP.y+8,9,0,Math.PI); ctx.fillStyle="#0a1f14"; ctx.fill();
  ctx.fillStyle="#c9d1d9"; ctx.font="bold 13px system-ui"; ctx.textAlign="center";
  ctx.save(); ctx.translate(CHIP.x+CHIP.w/2,CHIP.y+CHIP.h/2); ctx.fillText("PIC16F628A",0,-6);
  ctx.fillStyle="#6e7681"; ctx.font="11px system-ui"; ctx.fillText("DIP-18",0,12); ctx.restore();
  ctx.font="10px ui-monospace, monospace";
  // live pin-state squares (Proteus-style): red = 1, blue = 0; grey = no defined
  // value — a power pin (VSS/VDD), an input with nothing wired to it, or before the
  // core loads. Outputs always show their driven level; an input shows a level only
  // when a button is wired to it (idles per the button's polarity, flips on press).
  const ready=!!X, pa=ready?X.np_read_porta():0, pb=ready?X.np_read_portb():0;
  const trisA=ready?X.np_read_data(0x85):0xFF, trisB=ready?X.np_read_data(0x86):0xFF;
  for(const name in PIN){
    const p=PIN[name], isIo=/^R[AB]/.test(name), s=9;
    ctx.strokeStyle="#8b949e"; ctx.lineWidth=2.5; ctx.beginPath();
    ctx.moveTo(p.side==="L"?CHIP.x:CHIP.x+CHIP.w,p.y); ctx.lineTo(p.x,p.y); ctx.stroke();
    let col="#6e7681";
    if(ready&&isIo){ const m=/^R([AB])([0-7])$/.exec(name), input=((m[1]==="A"?trisA:trisB)>>(+m[2]))&1;
      if(!input || buttonPins.has(name)) col=pinVal(name,pa,pb)?"#f0594e":"#3f7fe0"; }
    roundRect(ctx, p.x-s/2, p.y-s/2, s, s, 2); ctx.fillStyle=col; ctx.fill();
    ctx.lineWidth=1; ctx.strokeStyle="rgba(0,0,0,0.4)"; ctx.stroke();
    ctx.fillStyle=isIo?"#9fb6c9":"#6e7681"; ctx.textAlign=p.side==="L"?"end":"start";
    ctx.fillText(name, p.side==="L"?p.x-s/2-5:p.x+s/2+5, p.y+3);
    ctx.fillStyle="#586069"; ctx.textAlign="center";
    ctx.fillText(p.num, p.side==="L"?CHIP.x+12:CHIP.x+CHIP.w-12, p.y+3);
  }
}
function drawLed(ctx,x,y,b){
  ctx.save(); ctx.beginPath(); ctx.arc(x,y,15,0,Math.PI*2);
  const g=ctx.createRadialGradient(x,y,2,x,y,15);
  g.addColorStop(0,`rgba(255,90,70,${0.22+0.78*b})`); g.addColorStop(1,`rgba(110,18,18,${0.35+0.4*b})`);
  ctx.fillStyle=g; if(b>0.05){ctx.shadowColor="rgba(255,90,70,0.85)";ctx.shadowBlur=16*b;} ctx.fill();
  ctx.shadowBlur=0; ctx.lineWidth=2; ctx.strokeStyle="#30363d"; ctx.stroke(); ctx.restore();
}
function drawSeven(ctx,x,y,b,W,H){
  const t=Math.round(W*0.145);
  const s=[[x+t,y,W-2*t,t],[x+W-t,y+t,t,H/2-t],[x+W-t,y+H/2,t,H/2-t],[x+t,y+H-t,W-2*t,t],
           [x,y+H/2,t,H/2-t],[x,y+t,t,H/2-t],[x+t,y+H/2-t/2,W-2*t,t]];
  ctx.save(); ctx.fillStyle="#070d09"; ctx.strokeStyle="#30363d"; ctx.lineWidth=1;
  roundRect(ctx,x-14,y-14,W+28,H+28,10); ctx.fill(); ctx.stroke();
  for(let i=0;i<7;i++){ const v=b[i]; ctx.fillStyle=`rgba(255,70,60,${0.05+0.95*v})`;
    ctx.shadowColor="rgba(255,70,60,0.9)"; ctx.shadowBlur=v>0.05?12*v:0; const r=s[i]; ctx.fillRect(r[0],r[1],r[2],r[3]); }
  ctx.restore();
}
function drawButton(ctx,x,y,pressed,label){
  ctx.save(); ctx.fillStyle=pressed?"#2ea043":"#21262d"; ctx.strokeStyle="#30363d"; ctx.lineWidth=2;
  roundRect(ctx,x,y,72,44,9); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#e6edf3"; ctx.font="12px ui-monospace, monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(label,x+36,y+22); ctx.restore();
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ===== loop =====
const canvas=document.getElementById("board"), ctx=canvas.getContext("2d"), statusEl=document.getElementById("status");
let wiring=null;
let buttonPins=new Set();   // pins that have a button wired to them (drives an input)
let components=build(LED_DIAGRAM), running=false;
let dbgOpen=false, dbgTick=0, dbgView="prog", dbgBank=0;
const breakSet=new Set();
const SUBSTEPS=64;
let clockHz=4000000;
let cycleBudget=0; // carries fractional cycles so low clocks run < 1 cycle/frame
let runRealMs=0, lastTick=performance.now(); // wall-clock stopwatch: real time the sim has run, independent of the PIC clock
function frame(){
  const tNow=performance.now();
  const dtMs=Math.min(tNow-lastTick, 100); // real ms since last frame (capped so a background-tab gap can't burst)
  lastTick=tNow;
  if(running&&X){
    runRealMs += dtMs;                     // wall-clock stopwatch (real time the sim has run)
    cycleBudget += (clockHz/4)*(dtMs/1000);// cycles for the REAL time elapsed — independent of the display refresh rate
    let want=Math.floor(cycleBudget); cycleBudget-=want;
    if(want>2000000) want=2000000;        // cap so an absurd clock can't freeze the tab
    if(want>0){
      const steps=Math.min(SUBSTEPS,want), per=Math.max(1,Math.floor(want/steps));
      for(const c of components) c.reset();
      let ran=0, brk=false;
      for(let s=0;s<steps && !brk;s++){ ran+=X.np_run_cycles(per); const pa=X.np_read_porta(),pb=X.np_read_portb(); for(const c of components) c.sample(pa,pb); if(X.np_break_hit()) brk=true; }
      if(!brk && ran<want){ X.np_run_cycles(want-ran); if(X.np_break_hit()) brk=true; }
      // Persist brightness across frames (~80 ms) so a slow multiplex spanning
      // several frames still shows every digit, like the eye / real hardware.
      for(const c of components) if(c.integrate) c.integrate(dtMs);
      if(brk){ running=false; document.getElementById("runBtn").textContent="Ejecutar"; if(dbgOpen) refreshDebug(); }
    }
  }
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawChip(ctx);
  for(const c of components) c.drawBody(ctx);
  drawWiring(ctx);
  updateReadout();
  if(dbgOpen && running && (++dbgTick % 6 === 0)) refreshDebug();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ===== controls =====
function setStatus(m,c){ statusEl.innerHTML=m; statusEl.className="status "+(c||""); }
function enable(ids,on){ ids.forEach((id)=>document.getElementById(id).disabled=!on); }
function coreReady(){ populateLabs(); enable(["labSelect","dbgToggle","stepBtn","step10","step100"],true); }
function setDiagram(d){ components=build(d); }
function afterHex(ok,name){ if(!ok){ setStatus("No se pudo leer "+name,"err"); return; }
  X.np_reset(); for(const c of components) if(c.idle) c.idle();
  enable(["runBtn","resetBtn"],true);
  running=true; runRealMs=0; document.getElementById("runBtn").textContent="Pausar";
  setStatus("Cargado "+name+" ✓ — ejecutando.","ok"); breakSet.clear(); if(X) X.np_clear_breaks(); if(dbgOpen){ buildProgView(); refreshDebug(); } }

document.getElementById("wasmFile").addEventListener("change", async (e)=>{
  const f=e.target.files[0]; if(!f) return;
  try{ await instantiate(await f.arrayBuffer()); coreReady(); setStatus("Núcleo cargado ✓ — elegí una placa o cargá un .hex.","ok"); }
  catch(err){ setStatus("Error al cargar el WASM: "+err,"err"); }
});
document.getElementById("hexFile").addEventListener("change", async (e)=>{ const f=e.target.files[0]; if(!f||!X) return; afterHex(loadHex(await f.text()),f.name); });
// Boards are set up by the teacher (via labs.js / the authoring tool), not loaded
// ad-hoc by students — so there is no diagram upload here, only the "Placa" dropdown.
function setClock(str){ document.getElementById("clock").value=str; applyClock(); }
// ===== boards / labs (demos are built in; instructor boards come from labs.js) =====
const BUILTIN_LABS = [
  { name:"Ejemplo · Parpadeo (LED en RB0)",                   group:"Ejemplos", diagram:LED_DIAGRAM, hex:BLINK_HEX,          clock:"1 kHz" },
  { name:"Ejemplo · Contador de 7 segmentos",                 group:"Ejemplos", diagram:SEG_DIAGRAM, hex:SEG_COUNTER_HEX,    clock:"4 MHz" },
  { name:"Ejemplo · Contador multiplexado de 2 dígitos",      group:"Ejemplos", diagram:LAB_DIAGRAM, hex:MUX_COUNTER_HEX,    clock:"4 MHz" },
  { name:"Ejemplo · Contador EEPROM (sobrevive al Reiniciar)",group:"Ejemplos", diagram:SEG_DIAGRAM, hex:EEPROM_COUNTER_HEX, clock:"4 MHz" },
];
// labs.js may set window.NP_LABS to authoring-tool exports ({name, group?, components})
// or full lab objects ({name, group?, diagram, hex?, clock?}). `group` is the dropdown
// heading the teacher picks; it defaults to "Trabajos Prácticos". The teacher's boards
// come first, the built-in "Ejemplos" last.
const USER_LABS = (Array.isArray(window.NP_LABS) ? window.NP_LABS : [])
  .map((d)=> d && d.components && !d.diagram ? { name:d.name||"Placa sin nombre", group:d.group, diagram:d, hex:d.hex, clock:d.clock } : d)
  .filter((l)=> l && l.diagram);
const LABS = USER_LABS.concat(BUILTIN_LABS);

function populateLabs(){
  const sel=document.getElementById("labSelect");
  let html='<option value="">— elegí una placa o ejemplo —</option>';
  const order=[], byGroup={};
  LABS.forEach((l,i)=>{ const g=l.group||"Trabajos Prácticos"; if(!byGroup[g]){ byGroup[g]=[]; order.push(g); } byGroup[g].push(i); });
  for(const g of order)
    html+=`<optgroup label="${g}">`+byGroup[g].map((i)=>`<option value="${i}">${LABS[i].name}</option>`).join("")+`</optgroup>`;
  sel.innerHTML=html;
}
document.getElementById("labSelect").addEventListener("change", (e)=>{
  const v=e.target.value; if(v===""||!X) return;
  const lab=LABS[+v];
  setClock(lab.clock||"4 MHz");
  setDiagram(lab.diagram);
  if(lab.hex){
    afterHex(loadHex(lab.hex), lab.name);
    if(/eeprom/i.test(lab.name)) setStatus("Cargado "+lab.name+" ✓ — apretá Reiniciar para cortar la energía; el conteo se mantiene.","ok");
  }else{
    for(const c of components) if(c.idle) c.idle();
    setStatus("Placa “"+lab.name+"” cargada ✓ — ahora cargá tu programa (.hex).","ok");
  }
});
document.getElementById("runBtn").addEventListener("click", ()=>{ running=!running; if(running && X && breakSet.has(X.np_pc())) X.np_step(); document.getElementById("runBtn").textContent=running?"Pausar":"Ejecutar"; });
document.getElementById("resetBtn").addEventListener("click", ()=>{ X.np_reset(); runRealMs=0; for(const c of components) if(c.idle) c.idle(); if(dbgOpen) refreshDebug(); });

// ===== Depurador (debugger panel) =====
const STATUS_BITS = [["C",0],["DC",1],["Z",2],["RP0",5]];
function refreshDebug(){
  if(!X) return;
  const pc=X.np_pc(), w=X.np_w(), cyc=X.np_cycles(), st=X.np_read_data(0x03);
  document.getElementById("dbgCycles").textContent = cyc.toLocaleString("es-AR");
  document.getElementById("dbgPC").textContent = "0x"+pc.toString(16).toUpperCase().padStart(3,"0");
  document.getElementById("dbgW").textContent = "0x"+w.toString(16).toUpperCase().padStart(2,"0");
  document.getElementById("dbgStatus").textContent = "0x"+st.toString(16).toUpperCase().padStart(2,"0");
  document.getElementById("dbgFlags").innerHTML = STATUS_BITS.map(([n,b])=>`<span class="${(st>>b)&1?"on":""}">${n}</span>`).join("");
  refreshActiveView();
}
function refreshActiveView(){
  if(dbgView==="prog") highlightPC();
  else if(dbgView==="data") buildDataView();
  else if(dbgView==="sfr") buildSFRView();
  else if(dbgView==="stack") buildStackView();
  else if(dbgView==="watch") buildWatchView();
}
function buildStackView(){
  const el=document.getElementById("dbgStack"); if(!el||!X) return;
  if(typeof X.np_stack_depth!=="function"){ el.innerHTML='<div class="watchEmpty">Pila no disponible: recompilá el núcleo WASM (núcleo viejo embebido).</div>'; return; }
  const depth=X.np_stack_depth();
  let html=`<div class="stkHead">Pila de retorno (CALL/RETURN) · profundidad <b>${depth}</b>/8</div>`;
  for(let i=7;i>=0;i--){
    const used=i<depth, top=i===depth-1;
    const v=used?"0x"+X.np_stack_at(i).toString(16).toUpperCase().padStart(3,"0"):"—";
    html+=`<div class="stkRow${used?" used":""}${top?" top":""}"><span class="sl">${i}</span><span class="sv">${v}</span><span class="stag">${top?"◂ tope":""}</span></div>`;
  }
  el.innerHTML=html;
}
const SFRS = [
  ["W",-1],
  ["STATUS",0x03,"IRP RP1 RP0 TO PD Z DC C"],
  ["OPTION",0x81,"RBPU INTEDG T0CS T0SE PSA PS2 PS1 PS0"],
  ["INTCON",0x0B,"GIE PEIE T0IE INTE RBIE T0IF INTF RBIF"],
  ["PORTA",0x05],["PORTB",0x06],["TRISA",0x85],["TRISB",0x86],
  ["TMR0",0x01],["PCL",0x02],["PCLATH",0x0A],["FSR",0x04],
  ["EEDATA",0x9A],["EEADR",0x9B],["EECON1",0x9C],
];
function buildSFRView(){
  if(!X) return;
  document.getElementById("dbgSFR").innerHTML = SFRS.map(([name,addr,bits])=>{
    const v = addr<0 ? X.np_w() : X.np_read_data(addr);
    const hex="0x"+v.toString(16).toUpperCase().padStart(2,"0"), bin=v.toString(2).padStart(8,"0");
    const bh = bits ? bits.split(" ").map((bn,i)=>`<span class="${(v>>(7-i))&1?"on":""}">${bn}</span>`).join("") : "";
    return `<div class="sfrRow"><span class="sname">${name}</span><span class="sval" data-addr="${addr}">${hex}</span><span class="sbin">${bin}</span><span class="sbits">${bh}</span></div>`;
  }).join("");
}
function buildDataView(){
  if(!X) return;
  const base=dbgBank*0x80, cells=[];
  for(let off=0;off<0x80;off++){
    if(off%16===0) cells.push(`<span class="dlabel">0x${(base+off).toString(16).toUpperCase().padStart(2,"0")}</span>`);
    const v=X.np_read_data(base+off);
    cells.push(`<span class="dcell${off<0x20?" sfr":""}" data-addr="${base+off}">${v.toString(16).toUpperCase().padStart(2,"0")}</span>`);
  }
  document.getElementById("dbgData").innerHTML=cells.join("");
}
let watchList=[]; try{ watchList=JSON.parse(localStorage.getItem("np_watch")||"[]"); }catch(e){}
const NAME_ADDR={}; SFRS.forEach(([n,a])=>{ if(a>=0) NAME_ADDR[n]=a; });
function resolveWatch(s){
  s=(s||"").trim(); if(!s) return null;
  const up=s.toUpperCase();
  if(up in NAME_ADDR) return {label:up, addr:NAME_ADDR[up]};
  const m=/^(?:0x)?([0-9a-f]+)$/i.exec(s); if(!m) return null;
  const addr=parseInt(m[1],16);
  if(isNaN(addr)||addr>0x1FF) return null;
  return {label:"0x"+addr.toString(16).toUpperCase(), addr};
}
function saveWatch(){ try{ localStorage.setItem("np_watch", JSON.stringify(watchList)); }catch(e){} }
function addWatch(){
  const inp=document.getElementById("watchInput"); const w=resolveWatch(inp.value);
  if(w && !watchList.some(x=>x.addr===w.addr)){ watchList.push(w); saveWatch(); }
  inp.value=""; buildWatchView();
}
function buildWatchView(){
  const el=document.getElementById("dbgWatch"); if(!el) return;
  if(!watchList.length){ el.innerHTML='<div class="watchEmpty">Agregá una dirección (0x20) o un registro (PORTB) para seguir su valor en vivo.</div>'; return; }
  el.innerHTML=watchList.map((w,i)=>{
    const v=X?X.np_read_data(w.addr):0;
    return `<div class="watchRow"><span class="wname">${w.label}</span><span class="waddr">0x${w.addr.toString(16).toUpperCase().padStart(2,"0")}</span><span class="wval">0x${v.toString(16).toUpperCase().padStart(2,"0")}</span><span class="wbin">${v.toString(2).padStart(8,"0")}</span><button class="wdel" data-i="${i}">×</button></div>`;
  }).join("");
  el.querySelectorAll(".wdel").forEach(b=>b.addEventListener("click",()=>{ watchList.splice(+b.dataset.i,1); saveWatch(); buildWatchView(); }));
}
function buildProgView(){
  if(!X) return;
  let last=0;
  for(let a=0;a<2048;a++) if(X.np_prog_word(a)!==0x3FFF) last=a;
  const n=Math.min(2048, Math.max(16, last+2)), rows=[];
  for(let a=0;a<n;a++){
    const word=X.np_prog_word(a);
    const dn=X.np_disasm(word);
    const txt=new TextDecoder().decode(new Uint8Array(X.memory.buffer, X.np_disasm_buffer(), dn));
    rows.push(`<div class="progRow" data-a="${a}"><span class="bp${breakSet.has(a)?" on":""}"></span><span class="pa">0x${a.toString(16).toUpperCase().padStart(3,"0")}</span><span class="pw">0x${word.toString(16).toUpperCase().padStart(4,"0")}</span><span class="pm">${txt}</span></div>`);
  }
  document.getElementById("dbgProg").innerHTML=rows.join("");
  highlightPC();
}
function highlightPC(){
  const prog=document.getElementById("dbgProg"); if(!prog||!X) return;
  const cur=prog.querySelector(".progRow.pc"); if(cur) cur.classList.remove("pc");
  const row=prog.querySelector(`.progRow[data-a="${X.np_pc()}"]`);
  if(row){ row.classList.add("pc"); row.scrollIntoView({block:"nearest"}); }
}
function snapBoard(){ if(!X) return; const pa=X.np_read_porta(), pb=X.np_read_portb(); for(const c of components){ if(c.reset)c.reset(); if(c.sample)c.sample(pa,pb); if(c.integrate)c.integrate(1); } }
function stepN(n){
  if(!X) return;
  running=false; document.getElementById("runBtn").textContent="Ejecutar";
  for(let i=0;i<n;i++){ X.np_step(); if(breakSet.has(X.np_pc())) break; }
  snapBoard(); refreshDebug();
}
function stepOnce(){ stepN(1); }
document.getElementById("dbgToggle").addEventListener("click", ()=>{
  dbgOpen=!dbgOpen;
  document.getElementById("dbgPanel").classList.toggle("hidden", !dbgOpen);
  document.getElementById("dbgToggle").textContent = (dbgOpen?"▾":"▸")+" Depurador";
  if(dbgOpen){ buildProgView(); refreshDebug(); }
});
document.getElementById("stepBtn").addEventListener("click", stepOnce);
document.querySelectorAll(".dbgTab").forEach(t=>t.addEventListener("click", ()=>{
  dbgView=t.dataset.view;
  document.querySelectorAll(".dbgTab").forEach(x=>x.classList.toggle("active", x===t));
  document.querySelectorAll(".dbgView").forEach(v=>v.classList.add("hidden"));
  document.getElementById("view-"+dbgView).classList.remove("hidden");
  if(dbgView==="prog") buildProgView();
  refreshDebug();
}));
document.getElementById("bank0").addEventListener("click", ()=>{ dbgBank=0; document.getElementById("bank0").classList.add("active"); document.getElementById("bank1").classList.remove("active"); buildDataView(); });
document.getElementById("bank1").addEventListener("click", ()=>{ dbgBank=1; document.getElementById("bank1").classList.add("active"); document.getElementById("bank0").classList.remove("active"); buildDataView(); });
document.getElementById("watchAdd").addEventListener("click", addWatch);
document.getElementById("watchInput").addEventListener("keydown", (e)=>{ if(e.key==="Enter") addWatch(); });
document.getElementById("step10").addEventListener("click", ()=>stepN(10));
document.getElementById("step100").addEventListener("click", ()=>stepN(100));
// click a program row to toggle a breakpoint (red dot); the run stops there.
document.getElementById("dbgProg").addEventListener("click", (e)=>{
  const row=e.target.closest(".progRow"); if(!row||!X) return;
  const a=+row.dataset.a;
  if(breakSet.has(a)){ breakSet.delete(a); X.np_clear_break(a); } else { breakSet.add(a); X.np_set_break(a); }
  row.querySelector(".bp").classList.toggle("on", breakSet.has(a));
});
// inline hex edit of a register/cell (pauses first so the live refresh can't clobber it).
function editCell(span, cur, write){
  running=false; document.getElementById("runBtn").textContent="Ejecutar";
  const inp=document.createElement("input"); inp.className="cellEdit";
  inp.value=cur.toString(16).toUpperCase().padStart(2,"0");
  span.replaceWith(inp); inp.focus(); inp.select();
  let done=false;
  const commit=(save)=>{ if(done) return; done=true; if(save){ const v=parseInt(inp.value,16); if(!isNaN(v)) write(v & 0xFF); } refreshActiveView(); };
  inp.addEventListener("keydown",(e)=>{ if(e.key==="Enter"){ e.preventDefault(); commit(true); } else if(e.key==="Escape") commit(false); });
  inp.addEventListener("blur",()=>commit(true));
}
document.getElementById("dbgData").addEventListener("click", (e)=>{
  const cell=e.target.closest(".dcell"); if(!cell||!X) return;
  const addr=+cell.dataset.addr; editCell(cell, X.np_read_data(addr), (v)=>X.np_write_data(addr,v));
});
document.getElementById("dbgSFR").addEventListener("click", (e)=>{
  const val=e.target.closest(".sval"); if(!val||!X) return;
  const addr=+val.dataset.addr; editCell(val, addr<0?X.np_w():X.np_read_data(addr), (v)=> addr<0?X.np_set_w(v):X.np_write_data(addr,v));
});
// ===== clock: text input + slider shortcut (1-2-5 steps, 1 Hz … 8 MHz) =====
const SPEEDS=[1,2,5,10,20,50,100,200,500,1e3,2e3,5e3,1e4,2e4,5e4,1e5,2e5,5e5,1e6,2e6,4e6,8e6];
const clockRange=document.getElementById("clockRange"); clockRange.max=SPEEDS.length-1;
function fmtHz(v){ return v>=1e6 ? (v/1e6)+" MHz" : v>=1e3 ? (v/1e3)+" kHz" : v+" Hz"; }
function nearestSpeedIdx(hz){ let bi=0,bd=Infinity; for(let i=0;i<SPEEDS.length;i++){ const d=Math.abs(Math.log(SPEEDS[i])-Math.log(hz)); if(d<bd){bd=d;bi=i;} } return bi; }
function parseClock(s){ s=(s||"").trim().toLowerCase().replace(/hz$/,"").trim(); const m=/^([0-9]*\.?[0-9]+)\s*([kmg]?)$/.exec(s); if(!m)return null; const mult={k:1e3,m:1e6,g:1e9}[m[2]]||1; return Math.round(parseFloat(m[1])*mult); }
function setClockHz(hz){ clockHz=hz; if(X) X.np_set_clock_hz(hz); const el=document.getElementById("clockVal"); el.textContent=hz.toLocaleString("es-AR")+" Hz"; el.className="status ok"; }
function applyClock(){ const v=parseClock(document.getElementById("clock").value);
  if(v&&v>0){ setClockHz(v); clockRange.value=nearestSpeedIdx(v); }
  else { const el=document.getElementById("clockVal"); el.textContent="inválido"; el.className="status err"; } }
document.getElementById("clock").addEventListener("input", applyClock);
clockRange.addEventListener("input", ()=>{ const hz=SPEEDS[+clockRange.value]; document.getElementById("clock").value=fmtHz(hz); setClockHz(hz); });
applyClock();

// ===== always-visible elapsed-time (mm:ss:ms) + cycle counter =====
function fmtTime(sec){ if(!isFinite(sec)||sec<0) sec=0; const ms=Math.floor(sec*1000);
  return String(Math.floor(ms/60000)).padStart(2,"0")+":"+String(Math.floor(ms/1000)%60).padStart(2,"0")+":"+String(ms%1000).padStart(3,"0"); }
let simReadoutEl=null;
function updateReadout(){ (simReadoutEl||(simReadoutEl=document.getElementById("simReadout"))).textContent=fmtTime(runRealMs/1000); }

// ===== drag a .hex onto the board to load it =====
const stageEl=document.querySelector(".stage");
["dragenter","dragover"].forEach((ev)=>stageEl.addEventListener(ev,(e)=>{ e.preventDefault(); stageEl.classList.add("drop"); }));
stageEl.addEventListener("dragleave",(e)=>{ if(!stageEl.contains(e.relatedTarget)) stageEl.classList.remove("drop"); });
stageEl.addEventListener("drop", async (e)=>{ e.preventDefault(); stageEl.classList.remove("drop");
  const f=e.dataTransfer&&e.dataTransfer.files[0]; if(!f) return;
  if(!X){ setStatus("Cargá el núcleo primero.","err"); return; }
  if(!/\.hex$/i.test(f.name)){ setStatus("Arrastrá un archivo .hex.","err"); return; }
  afterHex(loadHex(await f.text()), f.name); });

// ===== keyboard: space toggles Ejecutar / Pausar =====
window.addEventListener("keydown",(e)=>{
  if(e.code==="Space" && !/^(INPUT|SELECT|TEXTAREA|BUTTON)$/.test(e.target.tagName)){
    const b=document.getElementById("runBtn"); if(!b.disabled){ e.preventDefault(); b.click(); }
  }
});

function canvasPos(e){ const r=canvas.getBoundingClientRect(); return [(e.clientX-r.left)*canvas.width/r.width,(e.clientY-r.top)*canvas.height/r.height]; }
canvas.addEventListener("mousedown",(e)=>{ const [mx,my]=canvasPos(e); for(const c of components) if(c.hit&&c.hit(mx,my)) c.press(true); });
window.addEventListener("mouseup", ()=>{ for(const c of components) if(c.press) c.press(false); });

// ===== theme toggle (dark / light, persisted) =====
(function(){
  const root=document.documentElement, btn=document.getElementById("themeBtn");
  const meta=document.querySelector('meta[name="theme-color"]');
  function paintMeta(){ if(meta) meta.setAttribute("content", getComputedStyle(root).getPropertyValue("--bg").trim() || "#14161c"); }
  paintMeta();
  if(btn) btn.addEventListener("click", ()=>{
    const t = root.getAttribute("data-theme")==="dark" ? "light" : "dark";
    root.setAttribute("data-theme", t);
    try{ localStorage.setItem("np_theme", t); }catch(e){}
    paintMeta();
  });
})();

// ===== embedded-core auto-load =====
window.addEventListener("DOMContentLoaded", async ()=>{
  if(window.NP_WASM_BASE64){
    try{ await instantiate(b64ToBytes(window.NP_WASM_BASE64)); coreReady();
      document.getElementById("wasmWrap").classList.add("hidden");
      setStatus("Núcleo listo ✓ — elegí una placa o ejemplo, o cargá un .hex.","ok"); return;
    }catch(err){ setStatus("Falló el núcleo incrustado: "+err,"err"); }
  }
  setStatus("Cargá el núcleo (.wasm) para empezar — o incrustralo (ver runtime/README.md).");
});

// PWA: register the service worker (offline + installable). Needs https or localhost.
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
